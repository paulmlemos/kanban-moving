    `;

    const input      = panel.querySelector('.task-input');
    const descInput  = panel.querySelector('.task-desc-input');
    const dateInput  = panel.querySelector('.task-date-input');
    const addBtn     = panel.querySelector('.task-add-btn');

    // Recurrence selector
    panel.querySelectorAll('.task-recurrence-pill').forEach(b => {
      b.addEventListener('click', () => {
        taskRecurrences[client.id] = b.dataset.rec;
        panel.querySelectorAll('.task-recurrence-pill').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
      });
    });

    // Filter buttons
    panel.querySelectorAll('.task-filter-btn').forEach(b => {
      b.addEventListener('click', () => {
        taskFilters[client.id] = b.dataset.uid;
        refreshTaskPanel(client.id);
      });
    });

    // Assignee selector
    panel.querySelectorAll('.task-assignee-pill').forEach(b => {
      b.addEventListener('click', () => {
        taskAssignees[client.id] = b.dataset.uid;
        panel.querySelectorAll('.task-assignee-pill').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
      });
    });

    const doAdd = () => {
      addTask(client.id, input.value, descInput ? descInput.value : '', dateInput.value, taskAssignees[client.id], taskRecurrences[client.id]);
      input.value = '';
      if (descInput) descInput.value = '';
      dateInput.value = '';

      taskRecurrences[client.id] = '';
      panel.querySelectorAll('.task-recurrence-pill').forEach(x => x.classList.toggle('sel', x.dataset.rec === ''));
      input.focus();
    };

    addBtn.addEventListener('click', doAdd);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

    panel.querySelector('.task-clear-done').addEventListener('click', () => clearDoneTasks(client.id));

    grid.appendChild(panel);
    refreshTaskPanel(client.id);
  });

  updateGlobalTaskStats();
}

function editTask(clientId, id) {
  const panel = document.getElementById(`tpanel-${clientId}`);
  if (!panel) return;
  const item = panel.querySelector(`.task-item[data-id="${id}"]`);
  if (!item) return;

  const tasks = loadTasks(clientId);
  const task  = tasks.find(t => t.id === id);
  if (!task) return;

  let editAssignee   = task.assignee   || '';
  let editRecurrence = task.recurrence || '';

  item.classList.add('editing');
  const recOpts = [['', 'Única'], ['daily', 'Diária'], ['weekly', 'Semanal'], ['monthly', 'Mensal']];
  item.innerHTML = `
    <input class="task-edit-input" type="text" value="${escHtml(task.text)}" placeholder="Título da tarefa">
    <textarea class="task-edit-desc" rows="2" placeholder="Descrição (opcional)…">${escHtml(task.desc||'')}</textarea>
    <div class="task-edit-row">
      <input class="task-edit-date" type="date" value="${task.dueDate||''}">
      ${USERS.map(u => `<button class="task-assignee-pill${task.assignee===u.id?' sel':''}" data-uid="${u.id}">${u.name}</button>`).join('')}
      <button class="task-assignee-pill${!task.assignee?' sel':''}" data-uid="">—</button>
    </div>
    <div class="task-edit-row">
      ${recOpts.map(([v,l]) => `<button class="task-recurrence-pill${editRecurrence===v?' sel':''}" data-rec="${v}">↻ ${l}</button>`).join('')}
    </div>
    <div class="task-edit-row">
      <button class="task-save-btn">Salvar</button>
      <button class="task-cancel-btn">Cancelar</button>
    </div>
    <div class="task-files-edit-list"></div>
    <label class="task-file-add-label">
      📎 Adicionar arquivo
      <input type="file" class="task-file-input" multiple style="display:none">
    </label>
  `;

  // Render file list in edit mode
  function renderEditFiles() {
    const filesEl = item.querySelector('.task-files-edit-list');
    const files = loadTaskFiles(id);
    filesEl.innerHTML = files.length
      ? files.map(f => `<div class="task-file-item">
          <button class="task-file-dl" data-fileid="${f.id}">${escHtml(f.name)}</button>
          <button class="task-file-rm" data-fileid="${f.id}">×</button>
        </div>`).join('')
      : `<span style="font-size:10px;color:var(--text-dim)">Sem arquivos anexados</span>`;
    filesEl.querySelectorAll('.task-file-dl').forEach(b =>
      b.addEventListener('click', () => {
        const f = loadTaskFiles(id).find(f => f.id === b.dataset.fileid);
        if (f) downloadFile(f);
      })
    );
    filesEl.querySelectorAll('.task-file-rm').forEach(b =>
      b.addEventListener('click', () => {
        saveTaskFiles(id, loadTaskFiles(id).filter(f => f.id !== b.dataset.fileid));
        renderEditFiles();
      })
    );
  }
  renderEditFiles();

  item.querySelector('.task-file-input').addEventListener('change', async function() {
    const files = loadTaskFiles(id);
    for (const file of this.files) {
      files.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        name: file.name,
        type: file.type,
        data: await fileToBase64(file)
      });
    }
    saveTaskFiles(id, files);
    renderEditFiles();
    this.value = '';
  });

  item.querySelectorAll('.task-assignee-pill').forEach(b => {
    b.addEventListener('click', () => {
      editAssignee = b.dataset.uid;
      item.querySelectorAll('.task-assignee-pill').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
    });
  });

  item.querySelectorAll('.task-recurrence-pill').forEach(b => {
    b.addEventListener('click', () => {
      editRecurrence = b.dataset.rec;
      item.querySelectorAll('.task-recurrence-pill').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
    });
  });

  item.querySelector('.task-save-btn').addEventListener('click', () => {
    const newText = item.querySelector('.task-edit-input').value.trim();
    const newDesc = item.querySelector('.task-edit-desc').value.trim();
    const newDate = item.querySelector('.task-edit-date').value;
    if (!newText) return;
    const tasks2 = loadTasks(clientId);
    const t2 = tasks2.find(t => t.id === id);
    if (t2) {
      t2.text       = newText;
      t2.desc       = newDesc;
      t2.dueDate    = newDate;
      t2.assignee   = editAssignee;
      t2.recurrence = editRecurrence;
      saveTasks(clientId, tasks2);
    }
    refreshTaskPanel(clientId);
    refreshWeeklyManager();
    refreshDashboard();
  });

  item.querySelector('.task-cancel-btn').addEventListener('click', () => {
    refreshTaskPanel(clientId);
  });
}

// WEEKLY TASK MANAGER
// ══════════════════════════════════════════════════════════════════════════════

let taskWeekOff = 0;
let twUserFilter = 'all';

function dueCls(iso) {
  if (!iso) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return 'due-overdue';
  if (diff === 0) return 'due-today';
  if (diff <= 3)  return 'due-soon';
  return 'due-future';
}

function dueFmt(iso) {
  if (!iso) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return `${Math.abs(diff)}d atrás`;
  if (diff === 0) return 'Hoje';
  if (diff === 1) return 'Amanhã';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function twGetSunday(offset) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function twWeekDates(offset) {
  const sun = twGetSunday(offset);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(sun);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function isoFromDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function buildWeeklyManager() {
  const wrap = document.getElementById('taskWeeklyWrap');
  if (!wrap) return;
  wrap.querySelector('#twPrev').addEventListener('click', () => { taskWeekOff--; renderWeeklyManager(); });
  wrap.querySelector('#twNext').addEventListener('click', () => { taskWeekOff++; renderWeeklyManager(); });
  wrap.querySelector('#twToday').addEventListener('click', () => { taskWeekOff = 0; renderWeeklyManager(); });
  wrap.querySelectorAll('.tw-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      twUserFilter = btn.dataset.uid;
      wrap.querySelectorAll('.tw-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWeeklyManager();
    });
  });
  renderWeeklyManager();
}

function renderWeeklyManager() {
  const grid = document.getElementById('twGrid');
  const lbl  = document.getElementById('twWeekLabel');
  if (!grid) return;

  const dates = twWeekDates(taskWeekOff);
  const todayISO = isoFromDate(new Date());

  // label
  const startFmt = dates[0].toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  const endFmt   = dates[6].toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  lbl.textContent = `${startFmt} – ${endFmt}`;

  // bucket tasks by ISO date (clientes + Moving Marketing)
  const bucket = {};  // iso → [{clientId, task}]
  [...CLIENTS, MOVING_CLIENT].forEach(client => {
    loadTasks(client.id).forEach(task => {
      if (!task.dueDate) return;
      if (!bucket[task.dueDate]) bucket[task.dueDate] = [];
      bucket[task.dueDate].push({ clientId: client.id, clientName: client.name, clientColor: client.color, task });
    });
  });

  const DAYS_FULL = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

  grid.innerHTML = dates.map((d, i) => {
    const iso = isoFromDate(d);
    const items = bucket[iso] || [];
    const isToday = iso === todayISO;
    const dayNum = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

    const filtered = twUserFilter === 'all' ? items : items.filter(e => e.task.assignee === twUserFilter);
    const itemsHtml = filtered.length === 0
      ? '<div class="tw-empty">—</div>'
      : filtered.map(({ clientId, clientName, clientColor, task }) => {
          const user = USERS.find(u => u.id === task.assignee);
          const userBadge = user ? `<span class="task-user-badge" data-uid="${task.assignee}">${user.name}</span>` : '';
          const recurrenceLabels = { daily: 'diária', weekly: 'semanal', monthly: 'mensal' };
          const recBadge = task.recurrence ? `<span class="task-recurrence-badge">↻ ${recurrenceLabels[task.recurrence]||task.recurrence}</span>` : '';
          return `
          <div class="tw-item${task.done ? ' tw-done' : ''}" style="--client-color:${clientColor}">
            <button class="tw-cb" data-action="tw-toggle" data-client="${clientId}" data-id="${task.id}" title="${task.done ? 'Reabrir' : 'Concluir'}">${task.done ? '✓' : ''}</button>
            <div class="tw-task-body">
              <div class="tw-client-tag">${escHtml(clientName)}</div>
              <div class="tw-task-text">${escHtml(task.text)}</div>
            </div>
            ${recBadge}${userBadge}
            <button class="tw-edit-btn" data-action="tw-edit" data-client="${clientId}" data-id="${task.id}" title="Editar">✏</button>
          </div>`;
        }).join('');

    return `
      <div class="tw-col">
        <div class="tw-col-hdr${isToday ? ' tw-today' : ''}">
          <span class="tw-col-day">${DAYS_FULL[i]}</span>
          <span class="tw-col-date">${dayNum}</span>

        <div class="tw-body">${itemsHtml}</div>

  }).join('');

  // bind toggle buttons
  grid.querySelectorAll('[data-action="tw-toggle"]').forEach(btn => {
    btn.addEventListener('click', () => toggleTask(btn.dataset.client, btn.dataset.id));
  });
  // bind edit buttons

  });

function capKey(clientId)  { return `mmcap__${clientId}`; }

function loadCap(clientId) {
  try { return JSON.parse(mmGet(capKey(clientId)) || '{}'); }
  catch { return {}; }
}

function saveCap(clientId, data) {
  mmSet(capKey(clientId), JSON.stringify(data));
}

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.round((d - today) / 86400000);
}

function statusFromDiff(diff) {
  if (diff === null)  return { cls: 'empty',   label: '—' };
  if (diff < 0)       return { cls: 'overdue', label: `Vencido ${Math.abs(diff)}d` };
  if (diff === 0)     return { cls: 'urgent',  label: 'Hoje!' };
  if (diff <= 3)      return { cls: 'urgent',  label: `${diff}d` };
  if (diff <= 7)      return { cls: 'warn',    label: `${diff}d` };
  return               { cls: 'ok',      label: `${diff}d` };
}

function dotColor(diff) {
  if (diff === null || diff > 7) return '#22c55e';
  if (diff <= 3)  return '#f87171';
  return '#fbbf24';
}

// ── Mini Calendar ────────────────────────────────────────────────────────────

let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WD_NAMES = ['S','T','Q','Q','S','S','D'];

function getCapEvents() {
  const map = {};
  CLIENTS.forEach(c => {
    const { nextDate } = loadCap(c.id);
    if (!nextDate) return;
    if (!map[nextDate]) map[nextDate] = [];
    map[nextDate].push({ client: c, diff: daysDiff(nextDate) });
  });
  return map;
}

function renderMiniCal() {
  const cal    = document.getElementById('miniCal');
  const events = getCapEvents();
  const today  = new Date(); today.setHours(0,0,0,0);

  const firstDay    = new Date(calYear, calMonth, 1);
  const dow         = firstDay.getDay();
  const startOffset = dow === 0 ? 6 : dow - 1;
  const startDate   = new Date(firstDay);
  startDate.setDate(firstDay.getDate() - startOffset);

  const days = Array.from({ length: 42 }, (_, i) => {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    return d;
  });

  const daysHtml = days.map(d => {
    const iso            = d.toISOString().split('T')[0];
    const inMonth        = d.getMonth() === calMonth;
    const isToday        = d.toDateString() === today.toDateString();
    const evs            = events[iso] || [];

    const dotsHtml = evs.map(ev =>
      `<div class="cal-dot" style="background:${dotColor(ev.diff)}"></div>`
    ).join('');

    let cls = 'cal-day';
    if (!inMonth)    cls += ' other-month';
    if (isToday)     cls += ' is-today';
    if (evs.length)  cls += ' has-events';

    const evAttr = evs.length
      ? `data-evs="${encodeURIComponent(JSON.stringify(evs.map(e => ({
          name:  e.client.name,
          color: e.client.color,
          diff:  e.diff
        }))))}" data-iso="${iso}"`
      : '';

    return `<div class="${cls}" ${evAttr}>
      <span class="cal-day-num">${d.getDate()}</span>
      <div class="cal-dots">${dotsHtml}</div>
    </div>`;
  }).join('');

  cal.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" id="calPrev">‹</button>
      <span class="cal-month-label">${MONTH_NAMES[calMonth]} ${calYear}</span>
      <button class="cal-nav" id="calNext">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">${WD_NAMES.map(w => `<div class="cal-wd">${w}</div>`).join('')}</div>
      <div class="cal-days">${daysHtml}</div>
    </div>
    <div class="cal-legend">
      <div class="cal-legend-title">Legenda</div>
      <div class="cal-legend-row"><div class="cal-legend-dot" style="background:#22c55e"></div>+8 dias</div>
      <div class="cal-legend-row"><div class="cal-legend-dot" style="background:#fbbf24"></div>4–7 dias</div>
      <div class="cal-legend-row"><div class="cal-legend-dot" style="background:#f87171"></div>≤3 dias ou vencido</div>
    </div>
  `;

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderMiniCal();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderMiniCal();
  });

  // Tooltip
  const tooltip = document.getElementById('calTooltip');
  cal.querySelectorAll('.cal-day.has-events').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const evs      = JSON.parse(decodeURIComponent(el.dataset.evs));
      const dateLabel = new Date(el.dataset.iso + 'T12:00:00')
        .toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'long' });

      const itemsHtml = evs.map(ev => {
        const color = dotColor(ev.diff);
        const label = ev.diff < 0 ? `Vencido ${Math.abs(ev.diff)}d`
                    : ev.diff === 0 ? 'Hoje'
                    : `+${ev.diff}d`;
        return `<div class="cal-tooltip-item">
          <div class="cal-tooltip-dot" style="background:${ev.color}"></div>
          <span class="cal-tooltip-name">${escHtml(ev.name)}</span>
          <span class="cal-tooltip-days" style="color:${color}">${label}</span>
        </div>`;
      }).join('');

      tooltip.innerHTML = `<div class="cal-tooltip-date">${dateLabel}</div>${itemsHtml}`;
      tooltip.classList.add('visible');

      const rect = el.getBoundingClientRect();
      let left = rect.right + 10;
      let top  = rect.top;
      if (left + 240 > window.innerWidth)  left = rect.left - 248;
      if (top  + 160 > window.innerHeight) top  = window.innerHeight - 170;
      tooltip.style.left = left + 'px';
      tooltip.style.top  = top  + 'px';
    });

    el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
}

function kanbanDayToISO(wk, di) {
  const d = new Date(wk + 'T00:00:00');
  d.setDate(d.getDate() + di);

}

function syncSchedToKanban(cid, iso, state) {
  const date = new Date(iso + 'T00:00:00');
  const dow  = date.getDay();
  if (dow === 0 || dow === 6) return;
  const di  = dow - 1;
  const mon = new Date(date); mon.setDate(date.getDate() - di);
  const wk  = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
  const client = CLIENTS.find(c => c.id === cid);
  if (!client) return;
  client.platforms.forEach(p => {
    if (p.id !== 'ig') return;
    ['feed', ...(p.stories ? ['stories'] : [])].forEach(t => saveState(wk, cid, di, p.id, t, state));
  });
  if (wk === currentWk) render();
}

function syncKanbanToSched(cid, iso) {

  const dow  = date.getDay();
  if (dow === 0 || dow === 6) return;

// ── Thumbnail generator ───────────────────────────────────────────────────────

function genThumb(file) {
  return new Promise(res => {
    const isImg = /^image\//i.test(file.type) && !file.name.toLowerCase().endsWith('.heic');
    const isVid = /^video\//i.test(file.type) || /\.(mov|mp4|webm)$/i.test(file.name);
    if (isImg) {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => {
          const cv = document.createElement('canvas');
          const MAX = 140, ratio = Math.min(MAX/img.width, MAX/img.height, 1);
          cv.width = Math.round(img.width*ratio); cv.height = Math.round(img.height*ratio);
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          res(cv.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = () => res(null);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    } else if (isVid) {
      const v = document.createElement('video');
      const url = URL.createObjectURL(file);
      v.muted = true; v.src = url; v.currentTime = 1;
      v.addEventListener('seeked', () => {
        try {
          const cv = document.createElement('canvas');
          cv.width = Math.min(v.videoWidth, 140);
          cv.height = v.videoHeight * (cv.width / v.videoWidth);
          cv.getContext('2d').drawImage(v, 0, 0, cv.width, cv.height);
          URL.revokeObjectURL(url);
          res(cv.toDataURL('image/jpeg', 0.72));
        } catch { URL.revokeObjectURL(url); res(null); }
      }, { once: true });
      v.addEventListener('error', () => { URL.revokeObjectURL(url); res(null); }, { once: true });
      v.load();
    } else {
      res(null);
    }
  });
}

function fileExt(name)  { return (name.split('.').pop()||'').toUpperCase().slice(0,4); }
function isVidFile(s)   { return /video|\.mov$|\.mp4$|\.webm$/i.test(s||''); }

    </div>

function refreshIdeaPending(cid) {
  const wrap = document.getElementById(`ipending-${cid}`); if (!wrap) return;
  const pending = pendingIdeaFiles[cid] || [];
  wrap.innerHTML = pending.length ? ideaFileChipsHtml(pending,'pending',cid) : '';
  wrap.querySelectorAll('[data-pfi]').forEach(b => b.addEventListener('click', () => {
    pendingIdeaFiles[cid].splice(parseInt(b.dataset.pfi), 1);
    refreshIdeaPending(cid);
  }));
}

function bindIdeas(cid) {
  const input = document.getElementById(`iinput-${cid}`);
  const btn   = document.getElementById(`iadd-${cid}`);
  if (!input || !btn) return;
  if (!pendingIdeaFiles[cid]) pendingIdeaFiles[cid] = [];

  const doAdd = () => {
    const t = input.value.trim(); if (!t) return;
    const id = Date.now().toString(36);
    const list = loadIdeas(cid);
    const files = pendingIdeaFiles[cid] || [];
    list.unshift({ id, text: t, hasFiles: files.length > 0 });
    saveIdeas(cid, list);
    if (files.length) saveIdeaFiles(id, files);
    pendingIdeaFiles[cid] = [];
    input.value = '';
    refreshIdeas(cid);
  };
  btn.addEventListener('click', doAdd);
  input.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doAdd(); } });

  const fileInp = document.getElementById(`ifile-${cid}`);
  if (fileInp) {
    fileInp.addEventListener('change', () => {
      if (!pendingIdeaFiles[cid]) pendingIdeaFiles[cid] = [];
      Array.from(fileInp.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => { pendingIdeaFiles[cid].push({name:f.name,type:f.type,data:ev.target.result}); refreshIdeaPending(cid); };
        r.readAsDataURL(f);
      });
      fileInp.value = '';
    });

function bindEdit(cid) {
  const input = document.getElementById(`einput-${cid}`);
  const btn   = document.getElementById(`eadd-${cid}`);
  if (!input || !btn) return;
  if (!pendingEditFiles[cid]) pendingEditFiles[cid] = [];

  // status selector state
  let selectedStatus = 'parado';
  const pills = document.getElementById(`esel-${cid}`)?.querySelectorAll('[data-est]');
  if (pills) {
    const updatePills = () => {
      pills.forEach(p => {
        const s = EDIT_STATUS.find(x => x.id === p.dataset.est);
        p.className = 'edit-status-pill' + (p.dataset.est === selectedStatus ? ` active-${s.cls}` : '');
      });
    };
    updatePills();
    pills.forEach(p => p.addEventListener('click', () => { selectedStatus = p.dataset.est; updatePills(); }));
  }

  const doAdd = () => {
    const t = input.value.trim(); if (!t) return;
    const id = Date.now().toString(36);
    const list = loadEditItems(cid);
    const files = pendingEditFiles[cid] || [];
    list.unshift({ id, text: t, status: selectedStatus, hasFiles: files.length > 0 });
    saveEditItems(cid, list);
    if (files.length) saveEditFiles(id, files);
    pendingEditFiles[cid] = [];
    input.value = ''; selectedStatus = 'parado';
    refreshEdit(cid);
  };
  btn.addEventListener('click', doAdd);
  input.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doAdd(); } });

  const fileInp = document.getElementById(`efile-${cid}`);
  if (fileInp) {
    fileInp.addEventListener('change', () => {
      if (!pendingEditFiles[cid]) pendingEditFiles[cid] = [];
      Array.from(fileInp.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => { pendingEditFiles[cid].push({name:f.name,type:f.type,data:ev.target.result}); refreshEditPending(cid); };
        r.readAsDataURL(f);
      });
      fileInp.value = '';
    });
  }
  refreshEditPending(cid);

  // delete items
  document.getElementById(`elist-${cid}`)?.querySelectorAll('.edit-item-del').forEach(b =>
    b.addEventListener('click', () => {
      const old = loadEditItems(cid).find(x => x.id === b.dataset.id);
      if (old?.hasFiles) localStorage.removeItem(`mmeditf__${old.id}`);
      saveEditItems(cid, loadEditItems(cid).filter(x => x.id !== b.dataset.id));
      refreshEdit(cid);
    })
  );

  // cycle status on badge click
  document.getElementById(`elist-${cid}`)?.querySelectorAll('.edit-badge-st').forEach(b =>
    b.addEventListener('click', () => {
      const list = loadEditItems(cid);
      const it = list.find(x => x.id === b.dataset.eid);
      if (!it) return;
      const idx = EDIT_STATUS.findIndex(s => s.id === it.status);
      it.status = EDIT_STATUS[(idx + 1) % EDIT_STATUS.length].id;
      saveEditItems(cid, list);
      refreshEdit(cid);
    })
  );
}

function refreshEdit(cid) {
  const col = document.getElementById(`col-edit-${cid}`); if (!col) return;
  col.innerHTML = editColHtml(cid); bindEdit(cid);
}

const commCache = {};

function calcEaster(year) {
  const a=year%19, b=Math.floor(year/100), c=year%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31)-1;
  const dy=((h+l-7*m+114)%31)+1;
  return new Date(year, mo, dy);
}

function nthWeekday(year, month, weekday, n) {
  const d = new Date(year, month, 1);
  let diff = weekday - d.getDay();
  if (diff < 0) diff += 7;
  d.setDate(1 + diff + (n-1)*7);
  return d;
}

function lastWeekday(year, month, weekday) {
  const d = new Date(year, month+1, 0);
  let diff = d.getDay() - weekday;
  if (diff < 0) diff += 7;
  d.setDate(d.getDate() - diff);
  return d;
}

function d2iso(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getCommDates(year) {
  if (commCache[year]) return commCache[year];
  const dt = {};
  Object.entries(FIXED_COMM).forEach(([mmdd, name]) => { dt[`${year}-${mmdd}`] = name; });

  // Datas móveis baseadas na Páscoa
  const easter = calcEaster(year);
  const addOff = (offset, name) => {
    const d = new Date(easter); d.setDate(easter.getDate() + offset);
    dt[d2iso(d)] = name;
  };
  addOff(-48, 'Carnaval — Segunda');
  addOff(-47, 'Carnaval — Terça');
  addOff(-46, 'Quarta-feira de Cinzas');
  addOff(-2,  'Sexta-feira Santa');
  addOff(0,   'Páscoa');
  addOff(60,  'Corpus Christi');

  // Datas móveis por posição no calendário
  dt[d2iso(nthWeekday(year, 4, 0, 2))]  = 'Dia das Mães';
  dt[d2iso(nthWeekday(year, 7, 0, 2))]  = 'Dia dos Pais';
  dt[d2iso(lastWeekday(year, 10, 5))]   = 'Black Friday';

  commCache[year] = dt;
  return dt;
}

function getSchedMonth(cid) {
  if (!schedMonths[cid]) { const n=new Date(); schedMonths[cid]={y:n.getFullYear(),m:n.getMonth()}; }
  return schedMonths[cid];
}

const MONTH_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function getWeeksForMonth(y, m) {
  const first = new Date(y, m, 1);
  const last  = new Date(y, m+1, 0);
  const dow   = first.getDay();
  const back  = dow===0 ? 6 : dow-1;
  const start = new Date(first); start.setDate(first.getDate()-back);
  const weeks = []; const cur = new Date(start);
  while (cur <= last) {
    weeks.push(Array.from({length:5}, (_,i) => { const d=new Date(cur); d.setDate(cur.getDate()+i); return d; }));
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

      const thumbsHtml = dayItems.map(it => `

      let cls = 'sched-day';

      if (isToday)  cls += ' is-today';

      return `
        <div class="${cls}">
          <div class="sched-day-top">
            <span class="sched-day-num">${d.getDate()}</span>
            <button class="sched-fmt-btn" data-c="${cid}" data-iso="${iso}" data-idx="${fmtIdx}"

          </div>
          <div class="sched-legend-wrap">
            <textarea class="sched-legend" data-c="${cid}" data-iso="${iso}" placeholder="Legenda…" rows="1">${legVal}</textarea>
          </div>
        </div>`;
    }).join('')}</div>`
  ).join('');

  return `
    <div class="sched-nav-row">
      <button class="sched-nav" data-c="${cid}" data-dir="-1">‹</button>

// ── MATERIAL PICKER MODAL ─────────────────────────────────────────────────────

let pickerCid = null, pickerIso = null, pickerSel = [];

function openPicker(cid, iso) {
  pickerCid = cid; pickerIso = iso; pickerSel = [];
  const dateLabel = new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  document.getElementById('pickerTitle').textContent = `Adicionar — ${dateLabel}`;
  document.getElementById('pickerSelCount').textContent = '0 selecionados';
  renderPickerGrid();
  document.getElementById('pickerOverlay').classList.add('open');
}

function renderPickerGrid() {
  const grid = document.getElementById('pickerGrid');
  const mats = loadMats(pickerCid);
  if (!mats.length) { grid.innerHTML='<div class="picker-empty">Nenhum material ainda. Envie arquivos acima.</div>'; return; }
  grid.innerHTML = mats.map(m => `
    <div class="picker-item${pickerSel.includes(m.id)?' sel':''}" data-id="${m.id}" title="${escHtml(m.name)}">
      ${m.thumbnail
        ? `<img src="${m.thumbnail}">`
        : `<div class="picker-item-icon">${isVidFile(m.mimeType||m.name)?'🎬':'📄'}<span style="font-size:9px">${fileExt(m.name)}</span></div>`}
    </div>`).join('');
  grid.querySelectorAll('.picker-item').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.id;
    if (pickerSel.includes(id)) { pickerSel=pickerSel.filter(x=>x!==id); el.classList.remove('sel'); }
    else { pickerSel.push(id); el.classList.add('sel'); }
    document.getElementById('pickerSelCount').textContent = `${pickerSel.length} selecionado${pickerSel.length!==1?'s':''}`;
  }));
}

function closePicker() {
  document.getElementById('pickerOverlay').classList.remove('open');
  pickerCid=null; pickerIso=null; pickerSel=[];
}

function confirmPicker() {
  if (!pickerCid || !pickerIso || !pickerSel.length) { closePicker(); return; }
  const mats  = loadMats(pickerCid);
  const sched = loadSched(pickerCid);
  if (!sched[pickerIso]) sched[pickerIso] = [];
  pickerSel.forEach(id => {
    const m = mats.find(x=>x.id===id); if (!m) return;
    if (!sched[pickerIso].find(x=>x.id===id))
      sched[pickerIso].push({ id, name:m.name, thumbnail:m.thumbnail, mimeType:m.mimeType });
  });
  saveSched(pickerCid, sched);
  refreshSched(pickerCid);
  closePicker();
}

document.getElementById('pickerFileInput').addEventListener('change', async function() {
  if (!pickerCid) return;
  for (const f of Array.from(this.files)) {
    const thumb = await genThumb(f);
    const mats  = loadMats(pickerCid);
    const nm = { id:Date.now().toString(36)+Math.random().toString(36).slice(2), name:f.name, mimeType:f.type, thumbnail:thumb };
    mats.push(nm); saveMats(pickerCid, mats);
    pickerSel.push(nm.id);
  }
  this.value = ''; renderPickerGrid(); refreshMats(pickerCid); updateAccStats(pickerCid);
  document.getElementById('pickerSelCount').textContent = `${pickerSel.length} selecionado${pickerSel.length!==1?'s':''}`;
});

document.getElementById('pickerClose').addEventListener('click', closePicker);
document.getElementById('pickerCancel').addEventListener('click', closePicker);
document.getElementById('pickerConfirm').addEventListener('click', confirmPicker);
document.getElementById('pickerOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closePicker(); });

function getLastMonths(n) {
  const out = [], d = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const t = new Date(d.getFullYear(), d.getMonth() - i, 1);
    out.push(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`);
  }
  return out;
}

function finCardHtml(cid) {

  const months = getLastMonths(6);
  const curYM = months[months.length - 1];
  const pillsHtml = months.map(ym => {
    const [,mo] = ym.split('-').map(Number);
    const st = f.hist?.[ym] ?? 0;
    return `<button class="fin-pill${ym === curYM ? ' fin-cur' : ''}" data-ym="${ym}" data-st="${st}"
      >${MONTH_PT[mo-1].slice(0,3)}<span>${FIN_LBL[st]}</span></button>`;

function bindFinCard(card, cid) {

// DASHBOARD DE ALERTAS
// ══════════════════════════════════════════════════════════════════════════════

function refreshDashboard() {
  const grid = document.getElementById('dashGrid');
  if (!grid) return;

  const now = new Date(); now.setHours(0,0,0,0);
  const todayISO    = isoFromDate(now);
  const tomorrowISO = isoFromDate(new Date(now.getFullYear(), now.getMonth(), now.getDate()+1));

  // — Tarefas por usuário (clientes + Moving Marketing) —
  const userTaskData = {};
  USERS.forEach(u => { userTaskData[u.id] = { overdue: [], today: [] }; });
  [...CLIENTS, MOVING_CLIENT].forEach(c => {
    loadTasks(c.id).filter(t => !t.done && t.dueDate).forEach(t => {
      const uid = t.assignee && userTaskData[t.assignee] ? t.assignee : null;
      if (!uid) return;
      if (t.dueDate < todayISO) userTaskData[uid].overdue.push({client:c, task:t});
      else if (t.dueDate === todayISO || t.dueDate === tomorrowISO) userTaskData[uid].today.push({client:c, task:t});
    });
  });

  // — Captações —
  const overdueCap = [], urgentCap = [];
  CLIENTS.forEach(c => {
    const cap = loadCap(c.id);
    if (!cap.nextDate) return;
    const diff = daysDiff(cap.nextDate);
    if (diff < 0) overdueCap.push(c);
    else if (diff <= 3) urgentCap.push(c);
  });
  const capLevel = overdueCap.length > 0 ? 'alert' : urgentCap.length > 0 ? 'warn' : 'ok';

  // — Financeiro —
  const curYM = (()=>{ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })();
  const atrFin = [], pendFin = [];
  CLIENTS.filter(c => !c.noFinanceiro).forEach(c => {
    const f = loadFin(c.id);
    const st = f.hist?.[curYM] ?? 0;
    if (st === 2) atrFin.push(c);
    else if (st === 0 && f.valor) pendFin.push(c);
  });
  const finLevel = atrFin.length > 0 ? 'alert' : pendFin.length > 0 ? 'warn' : 'ok';

  // — Progresso semanal —
  let totalSlots = 0, completedSlots = 0;
  CLIENTS.filter(c => !c.noKanban).forEach(c => c.platforms.forEach(p => {
    for (let di = 0; di < 5; di++) {
      totalSlots++;
      if (getState(currentWk, c.id, di, p.id, 'feed') > 0) completedSlots++;
    }
  }));
  const weekPct   = totalSlots > 0 ? Math.round(completedSlots / totalSlots * 100) : 0;
  const weekLevel = weekPct >= 80 ? 'ok' : weekPct >= 40 ? 'warn' : 'alert';

  const tagHtml = (arr, cls) => {
    const items = arr.slice(0,4).map(c => `<span class="dash-tag ${cls}">${(c.name||c).split(' ')[0]}</span>`).join('');
    const more  = arr.length > 4 ? `<span class="dash-tag">+${arr.length-4}</span>` : '';
    return items + more;
  };

  const userTaskCard = (u) => {
    const d = userTaskData[u.id];
    const cnt   = d.overdue.length + d.today.length;
    const level = d.overdue.length > 0 ? 'alert' : d.today.length > 0 ? 'warn' : 'ok';
    const src   = d.overdue.length ? d.overdue : d.today;
    const cls   = d.overdue.length ? 'alert' : 'warn';
    const sub   = d.overdue.length ? `${d.overdue.length} vencida${d.overdue.length>1?'s':''}` : d.today.length ? 'hoje/amanhã' : 'Tudo em dia';
    return `
    <div class="dash-card ${level}" style="border-left-color:${level==='ok'?'#22c55e':level==='warn'?'#f59e0b':'#f87171'}">
      <div class="dash-card-hdr">
        <span class="dash-card-title" style="color:${u.color};opacity:.85">● ${u.name}</span>
        <span class="dash-card-icon">✓</span>
      </div>
      <div class="dash-card-val">${cnt}</div>
      <div class="dash-card-sub">${sub}</div>
      <div class="dash-tags">${cnt > 0 ? tagHtml(src.map(x=>x.client), cls) : '<span class="dash-tag ok-tag">ok</span>'}</div>
    </div>`;
  };

  const capTagSrc   = overdueCap.length  ? overdueCap  : urgentCap;
  const capTagCls   = overdueCap.length  ? 'alert'     : 'warn';
  const finTagSrc   = atrFin.length      ? atrFin      : pendFin;
  const finTagCls   = atrFin.length      ? 'alert'     : 'warn';

  // — Totais de tarefas —
  let allPending = 0, allDone = 0;
  [...CLIENTS, MOVING_CLIENT].forEach(c => {
    loadTasks(c.id).forEach(t => t.done ? allDone++ : allPending++);
  });
  const clientCount = CLIENTS.length;

  grid.innerHTML = `
    <div class="dash-card ok">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Clientes ativos</span>
        <span class="dash-card-icon">◉</span>
      </div>
      <div class="dash-card-val">${clientCount}</div>
      <div class="dash-card-sub">clientes na agência</div>
      <div class="dash-tags"><span class="dash-tag ok-tag">ativos</span></div>
    </div>
    <div class="dash-card ${allPending > 0 ? 'warn' : 'ok'}">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Tarefas a fazer</span>
        <span class="dash-card-icon">○</span>
      </div>
      <div class="dash-card-val">${allPending}</div>
      <div class="dash-card-sub">tarefas pendentes</div>
      <div class="dash-tags"><span class="dash-tag ${allPending > 0 ? 'warn' : 'ok-tag'}">${allPending > 0 ? `${allPending} pendente${allPending>1?'s':''}` : 'ok'}</span></div>
    </div>
    <div class="dash-card ok">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Tarefas cumpridas</span>
        <span class="dash-card-icon">✓</span>
      </div>
      <div class="dash-card-val">${allDone}</div>
      <div class="dash-card-sub">tarefas concluídas</div>
      <div class="dash-tags"><span class="dash-tag ok-tag">${allDone} concluída${allDone!==1?'s':''}</span></div>
    </div>
    ${USERS.map(u => userTaskCard(u)).join('')}
    <div class="dash-card ${capLevel}">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Captações</span>
        <span class="dash-card-icon">📸</span>
      </div>
      <div class="dash-card-val">${overdueCap.length + urgentCap.length}</div>
      <div class="dash-card-sub">${overdueCap.length ? `${overdueCap.length} em atraso` : urgentCap.length ? 'próximos 3 dias' : 'Agenda ok'}</div>
      <div class="dash-tags">${(overdueCap.length+urgentCap.length) > 0 ? tagHtml(capTagSrc, capTagCls) : '<span class="dash-tag ok-tag">ok</span>'}</div>
    </div>
    <div class="dash-card ${finLevel}">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Financeiro (mês)</span>
        <span class="dash-card-icon">$</span>
      </div>
      <div class="dash-card-val">${atrFin.length + pendFin.length}</div>
      <div class="dash-card-sub">${atrFin.length ? `${atrFin.length} em atraso` : pendFin.length ? 'pendentes de pagamento' : 'Recebimentos ok'}</div>
      <div class="dash-tags">${(atrFin.length+pendFin.length) > 0 ? tagHtml(finTagSrc, finTagCls) : '<span class="dash-tag ok-tag">ok</span>'}</div>
    </div>
    <div class="dash-card ${weekLevel}">
      <div class="dash-card-hdr">
        <span class="dash-card-title">Progresso semanal</span>
        <span class="dash-card-icon">◆</span>
      </div>
      <div class="dash-card-val">${weekPct}<span style="font-size:14px;font-weight:400">%</span></div>
      <div class="dash-card-sub">${completedSlots} de ${totalSlots} slots publicados/prog.</div>
      <div class="dash-progress"><div class="dash-progress-fill" style="width:${weekPct}%"></div></div>
    </div>
  `;
}

function buildDash() { refreshDashboard(); }
buildDash();

// NOTAS DE ALINHAMENTO
// ══════════════════════════════════════════════════════════════════════════════

function loadNotas(cid)   { return lsGet(`mmnotas__${cid}`) || []; }
function saveNotas(cid,v) { lsSave(`mmnotas__${cid}`, v); }

function notaCardHtml(cid) {
  const notas = loadNotas(cid);
  const listHtml = notas.length === 0
    ? `<div class="nota-empty">Nenhuma nota ainda.</div>`
    : notas.map(n => `
        <div class="nota-item" data-nid="${n.id}">
          <span class="nota-date">${n.date}</span>
          <span class="nota-text">${escHtml(n.text)}</span>
          <button class="nota-del" data-nid="${n.id}" title="Remover">×</button>
        </div>`).join('');
  return `
    <div class="nota-list">${listHtml}</div>
    <div class="nota-input-area">
      <textarea class="nota-textarea" rows="2" placeholder="Nova nota de alinhamento…"></textarea>
      <button class="nota-add-btn">Adicionar</button>
    </div>
  `;
}

function refreshNotaCard(cid) {
  const card = document.querySelector(`.nota-card[data-cid="${cid}"]`);
  if (!card) return;
  card.querySelector('.nota-list').outerHTML; // placeholder
  const inner = card.querySelector('.nota-card-body');
  if (inner) inner.innerHTML = notaCardHtml(cid);
  bindNotaCard(card, cid);
}

function bindNotaCard(card, cid) {
  const ta  = card.querySelector('.nota-textarea');
  const btn = card.querySelector('.nota-add-btn');
  if (btn) btn.onclick = () => {
    const txt = ta.value.trim();
    if (!txt) return;
    const notas = loadNotas(cid);
    const now = new Date();
    const days   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    notas.unshift({
      id:   Date.now().toString(36) + Math.random().toString(36).slice(2),
      text: txt,
      date: `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`
    });
    saveNotas(cid, notas);
    ta.value = '';
    rebuildNotaCard(card, cid);
  };
  card.querySelectorAll('.nota-del').forEach(b => {
    b.onclick = () => {
      const nid = b.dataset.nid;
      saveNotas(cid, loadNotas(cid).filter(n => n.id !== nid));
      rebuildNotaCard(card, cid);
    };
  });
  if (ta) ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) btn && btn.click();
  });
}

function rebuildNotaCard(card, cid) {
  const body = card.querySelector('.nota-card-body');
  if (body) { body.innerHTML = notaCardHtml(cid); bindNotaCard(card, cid); }
}

function buildNotasGrid() {
  const grid = document.getElementById('notasGrid');
  if (!grid) return;
  grid.innerHTML = '';
  CLIENTS.forEach(client => {
    const card = document.createElement('div');
    card.className = 'nota-card';
    card.dataset.cid = client.id;
    card.style.setProperty('--client-color', client.color);
    card.innerHTML = `
      <div class="nota-card-header">
        <span class="nota-card-name">${client.name}</span>
      </div>
      <div class="nota-card-body">${notaCardHtml(client.id)}</div>
    `;
    bindNotaCard(card, client.id);
    grid.appendChild(card);
  });
}
buildNotasGrid();

// ── Acessos por cliente ──────────────────────────────────────────────────────

const REDES_SOCIAIS = [
  { id: 'instagram',  label: 'Instagram',          icon: '📷' },
  { id: 'facebook',   label: 'Facebook',           icon: '📘' },
  { id: 'tiktok',     label: 'TikTok',             icon: '🎵' },
  { id: 'pinterest',  label: 'Pinterest',          icon: '📌' },
  { id: 'linkedin',   label: 'LinkedIn',           icon: '💼' },
  { id: 'youtube',    label: 'YouTube',            icon: '▶️' },
  { id: 'whatsapp',   label: 'WhatsApp Business',  icon: '💬' },
  { id: 'gmn',        label: 'Google Meu Negócio', icon: '📍' },
  { id: 'spotify',    label: 'Spotify',            icon: '🎧' },
  { id: 'twitter',    label: 'X / Twitter',        icon: '✖' },
];

function loadAcessos(cid)    { try { return JSON.parse(localStorage.getItem(`mmacesso__${cid}`) || '{}'); } catch { return {}; } }
function saveAcessos(cid, v) { localStorage.setItem(`mmacesso__${cid}`, JSON.stringify(v)); }

function buildAcessosGrid() {
  const grid = document.getElementById('acessosGrid');
  if (!grid) return;
  grid.innerHTML = '';

  const ALL_CLI = [...CLIENTS, MOVING_CLIENT];
  ALL_CLI.forEach(c => {
    const container = document.createElement('div');
    container.id = `acesso-${c.id}`;
    container.className = 'acessos-grid';
    const data = loadAcessos(c.id);

    REDES_SOCIAIS.forEach(rede => {
      const rd = data[rede.id] || {};
      const card = document.createElement('div');
      card.className = 'acesso-card';
      card.innerHTML = `
        <div class="acesso-card-header">
          <span class="acesso-icon">${rede.icon}</span>
          <span>${rede.label}</span>
        </div>
        <div>
          <div class="acesso-field-label">Login / E-mail</div>
          <input class="acesso-input" type="text" placeholder="—" value="${escHtml(rd.login||'')}" data-field="login" autocomplete="off" spellcheck="false">
        </div>
        <div>
          <div class="acesso-field-label">Senha</div>
          <div class="acesso-pass-wrap">
            <input class="acesso-input acesso-pass" type="password" placeholder="—" value="${escHtml(rd.pass||'')}" data-field="pass" autocomplete="new-password" spellcheck="false">
            <button class="acesso-eye" title="Mostrar/ocultar">👁</button>
          </div>
        </div>
        <div class="acesso-saved"></div>
      `;

      card.querySelector('.acesso-eye').addEventListener('click', () => {
        const inp = card.querySelector('.acesso-pass');
        inp.type = inp.type === 'password' ? 'text' : 'password';
      });

      card.querySelectorAll('.acesso-input').forEach(inp => {
        inp.addEventListener('change', () => {
          const d = loadAcessos(c.id);
          if (!d[rede.id]) d[rede.id] = {};
          d[rede.id][inp.dataset.field] = inp.value;
          saveAcessos(c.id, d);
          const savedEl = card.querySelector('.acesso-saved');
          savedEl.textContent = 'salvo ✓';
          setTimeout(() => { savedEl.textContent = ''; }, 2000);
        });
      });

      container.appendChild(card);
    });

    grid.appendChild(container);
  });
}
buildAcessosGrid();

// ── Seções por cliente ───────────────────────────────────────────────────────

function buildClientSections() {
  const wrap    = document.getElementById('clientSectionsWrap');
  const navInner = document.getElementById('mmSnavInner');
  wrap.innerHTML = '';

  const ALL_CLI = [...CLIENTS, MOVING_CLIENT];

  ALL_CLI.forEach(c => {
    // Link no menu
    const link = document.createElement('a');
    link.className = 'mm-snav-link';
    link.href = `#sec-cli-${c.id}`;
    link.textContent = c.name.split(' ')[0].toUpperCase();
    navInner.appendChild(link);

    // Abas por cliente
    const tabDefs = [];
    if (!c.isInternal) tabDefs.push({ id: 'crono',   label: 'Cronograma' });
    tabDefs.push(                    { id: 'tasks',   label: 'Tarefas'   });
    if (!c.isInternal) tabDefs.push({ id: 'cap',     label: 'Captações' });
    if (!c.isInternal) tabDefs.push({ id: 'ficha',   label: 'Ficha'     });
    tabDefs.push(                    { id: 'notas',   label: 'Notas'     });
    if (!c.isInternal) tabDefs.push({ id: 'result',  label: 'Resultados' });
    tabDefs.push(                    { id: 'acessos', label: 'Acessos'   });

    const sec = document.createElement('div');
    sec.className = 'client-section sec-anchor';
    sec.id = `sec-cli-${c.id}`;
    sec.style.setProperty('--client-color', c.color);

    sec.innerHTML = `
      <div class="client-section-header">
        <span class="client-section-dot"></span>
        <span class="client-section-name">${c.name}</span>
      </div>
      <div class="client-tabs">
        ${tabDefs.map((t, i) => `<button class="client-tab-btn${i === 0 ? ' active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('')}
      </div>
      <div class="client-tab-panels">
        ${tabDefs.map((t, i) => `<div class="client-tab-panel${i === 0 ? ' active' : ''}" data-panel="${t.id}" id="cpanel-${t.id}-${c.id}"></div>`).join('')}
      </div>
    `;

    wrap.appendChild(sec);

    // Mover elementos já construídos para os painéis
    const moveEl = (srcId, panelId) => {
      const el  = document.getElementById(srcId);
      const pnl = document.getElementById(`cpanel-${panelId}-${c.id}`);
      if (el && pnl) pnl.appendChild(el);
    };
    const moveQuery = (sel, panelId) => {
      const el  = document.querySelector(sel);
      const pnl = document.getElementById(`cpanel-${panelId}-${c.id}`);
      if (el && pnl) pnl.appendChild(el);
    };

    moveEl(`tpanel-${c.id}`,  'tasks');
    moveQuery(`.nota-card[data-cid="${c.id}"]`, 'notas');
    moveEl(`acesso-${c.id}`, 'acessos');
    if (!c.isInternal) {
      moveEl(`capc-${c.id}`,   'cap');
      moveEl(`ficha-${c.id}`,  'ficha');
      moveEl(`rescard-${c.id}`, 'result');
      moveEl(`acc-${c.id}`,    'crono');
    }

    // Troca de abas
    sec.querySelectorAll('.client-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sec.querySelectorAll('.client-tab-btn').forEach(b => b.classList.remove('active'));
        sec.querySelectorAll('.client-tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const pnl = sec.querySelector(`[data-panel="${btn.dataset.tab}"]`);
        if (pnl) pnl.classList.add('active');
      });
    });
  });
}

buildClientSections();

// ─── NAV HIGHLIGHT (IntersectionObserver) ────────────────────────────────────
(function() {
  const links   = document.querySelectorAll('.mm-snav-link');
  const anchors = document.querySelectorAll('.sec-anchor');
  const navMap  = {};
  links.forEach(l => {
    const id = l.getAttribute('href').replace('#', '');
    navMap[id] = l;
  });
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = navMap[e.target.id];
        if (link) {
          link.classList.add('active');
          link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }
    });
  }, { rootMargin: '-20% 0px -75% 0px', threshold: 0 });
  anchors.forEach(a => { if (a.id) obs.observe(a); });
})();
