<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema da Agência — Moving Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #080808;
      --surface:      #111111;
      --surface-2:    #161616;
      --border:       rgba(255,255,255,0.07);
      --border-2:     rgba(255,255,255,0.13);
      --text:         #e8e3dc;
      --text-dim:     rgba(232,227,220,0.45);
      --accent:       #7c5cfc;
      --accent-dim:   rgba(124,92,252,0.15);
      --accent-text:  #a78bfa;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,6,6,0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .header::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, #7c5cfc 0%, #ec4899 35%, #f59e0b 65%, #7c5cfc 100%);
      background-size: 200% 100%;
      animation: mmLine 8s linear infinite;
    }
    @keyframes mmLine {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    .mm-brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(135deg, rgba(124,92,252,0.05) 0%, transparent 55%);
      gap: 24px;
    }
    .mm-logo-wrap { display: flex; align-items: center; }
    .mm-logo { height: 30px; width: auto; object-fit: contain; }
    .mm-brand-center { flex: 1; text-align: center; }
    .mm-tagline {
      font-size: 11px;
      color: rgba(232,227,220,0.28);
      letter-spacing: 0.14em;
      font-style: italic;
    }
    .mm-brand-right { display: flex; align-items: center; }
    .mm-date-badge {
      font-size: 10px;
      color: rgba(232,227,220,0.38);
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 5px 13px;
      white-space: nowrap;
    }
    .mm-nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 24px;
      gap: 16px;
    }

    /* ── DASHBOARD ───────────────────────────────── */
    .dash-section {
      padding: 14px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 12px;
    }
    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-left: 3px solid rgba(255,255,255,0.07);
      transition: border-left-color 0.25s;
    }
    .dash-card.ok    { border-left-color: #22c55e; }
    .dash-card.warn  { border-left-color: #f59e0b; }
    .dash-card.alert { border-left-color: #f87171; }
    .dash-card-hdr   { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
    .dash-card-title { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); }
    .dash-card-icon  { font-size:12px; color:rgba(255,255,255,0.2); }
    .dash-card-val   { font-size:28px; font-weight:700; line-height:1; color:var(--text); }
    .dash-card-sub   { font-size:10px; color:var(--text-dim); }
    .dash-tags       { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
    .dash-tag        { font-size:8px; background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:4px; padding:1px 6px; color:var(--text-dim); white-space:nowrap; }
    .dash-tag.alert  { color:#f87171; background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.22); }
    .dash-tag.warn   { color:#f59e0b; background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.22); }
    .dash-tag.ok-tag { color:#22c55e; background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.22); }
    .dash-progress   { height:3px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; margin-top:5px; }
    .dash-progress-fill { height:100%; background:linear-gradient(90deg,#7c5cfc,#22c55e); transition:width .4s; }

    /* ── NOTAS DE ALINHAMENTO ───────────────────── */
    .notas-section { padding:0 16px 48px; }
    .notas-section-header { display:flex; align-items:center; padding:28px 0 16px; border-top:1px solid var(--border); }
    .notas-section-title { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
    .notas-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; min-width:1050px; }
    .nota-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; border-top:3px solid var(--client-color,rgba(255,255,255,.15)); }
    .nota-card-header { padding:10px 13px 9px; border-bottom:1px solid var(--border); }
    .nota-card-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
    .nota-input-area { padding:8px 9px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:5px; }
    .nota-textarea { background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:5px 8px; font-size:10px; font-family:inherit; color:var(--text); outline:none; resize:none; transition:border-color .15s; width:100%; box-sizing:border-box; }
    .nota-textarea:focus { border-color:rgba(124,92,252,.4); }
    .nota-textarea::placeholder { color:rgba(232,227,220,.22); }
    .nota-add-btn { align-self:flex-end; background:var(--accent-dim); border:1px solid rgba(124,92,252,.3); color:var(--accent-text); border-radius:6px; padding:4px 11px; font-size:10px; cursor:pointer; font-family:inherit; transition:all .12s; }
    .nota-add-btn:hover { background:rgba(124,92,252,.25); }
    .nota-list { padding:5px 7px; display:flex; flex-direction:column; max-height:190px; overflow-y:auto; flex:1; }
    .nota-list::-webkit-scrollbar { width:3px; }
    .nota-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
    .nota-item { display:flex; gap:7px; padding:5px 3px; border-bottom:1px solid rgba(255,255,255,.04); }
    .nota-item:last-child { border-bottom:none; }
    .nota-date { font-size:9px; color:var(--accent-text); white-space:nowrap; font-weight:600; flex-shrink:0; padding-top:1px; opacity:.75; }
    .nota-text { font-size:10px; color:var(--text); flex:1; line-height:1.5; word-break:break-word; }
    .nota-del { background:none; border:none; color:rgba(255,255,255,.1); cursor:pointer; font-size:14px; padding:0; flex-shrink:0; opacity:0; transition:all .12s; font-family:inherit; line-height:1; }
    .nota-item:hover .nota-del { opacity:1; }
    .nota-del:hover { color:#f87171; }
    .nota-empty { font-size:10px; color:rgba(232,227,220,.2); text-align:center; padding:18px 0; font-style:italic; }

    .week-nav { display: flex; align-items: center; gap: 8px; }
    .week-label {
      font-size: 13px; font-weight: 500;
      min-width: 170px; text-align: center;
    }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-2); }

    .btn-accent {
      background: var(--accent-dim);
      border-color: rgba(124,92,252,0.3);
      color: var(--accent-text);
    }
    .btn-accent:hover { background: rgba(124,92,252,0.22); }

    .btn-danger {
      color: rgba(248,113,113,0.7);
      border-color: rgba(248,113,113,0.2);
    }
    .btn-danger:hover { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.35); color: #f87171; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    /* LEGEND */
    .legend { display: flex; align-items: center; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
    .legend-dot.s0 { background: rgba(255,255,255,0.2); }
    .legend-dot.s1 { background: #fbbf24; }
    .legend-dot.s2 { background: #22c55e; }

    /* STATS BAR */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stats-label { font-size: 11px; color: var(--text-dim); }
    .stats-value { font-size: 11px; font-weight: 500; }
    .stats-value .n { color: var(--accent-text); }

    .progress-track {
      width: 140px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #22c55e);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .stats-badges { display: flex; gap: 10px; margin-left: auto; }
    .stats-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid transparent;
    }
    .stats-badge.prog {
      background: rgba(251,191,36,0.1);
      border-color: rgba(251,191,36,0.25);
      color: #fbbf24;
    }
    .stats-badge.post {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.25);
      color: #22c55e;
    }

    /* ── BOARD ──────────────────────────────────── */
    .board-wrapper {
      padding: 16px;
      overflow-x: auto;
      min-height: calc(100vh - 120px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(210px, 1fr));
      gap: 12px;
      min-width: 1050px;
    }

    /* ── COLUMN ─────────────────────────────────── */
    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .col-header {
      padding: 13px 14px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .col-day {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .col-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .col-header.is-today {
      background: rgba(124,92,252,0.06);
      border-left: 3px solid var(--accent);
    }
    .col-header.is-today .col-day { color: var(--accent-text); }

    .col-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
    }

    /* ── CLIENT CARD ────────────────────────────── */
    .client-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px 10px;
      border-left: 3px solid var(--client-color, rgba(255,255,255,0.15));
      transition: border-color 0.2s;
    }

    .client-card:hover {
      border-color: var(--client-color, rgba(255,255,255,0.2));
      background: #1a1a1a;
    }

    .client-name {
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    /* ── PLATFORM ROW ───────────────────────────── */
    .platform-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .platform-row:last-child { margin-bottom: 0; }

    .plat-badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      min-width: 24px;
      text-align: center;
    }
    .plat-ig { background: rgba(225,48,108,0.15); color: #f472b6; border: 1px solid rgba(225,48,108,0.25); }
    .plat-tt { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.12); }
    .plat-li { background: rgba(10,102,194,0.18); color: #60a5fa; border: 1px solid rgba(10,102,194,0.3); }

    .status-group { display: flex; gap: 4px; flex-wrap: wrap; }

    /* ── STATUS BUTTON ──────────────────────────── */
    .sbtn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.12s;
      user-select: none;
      white-space: nowrap;
      letter-spacing: 0.015em;
    }

    .sbtn[data-state="0"] {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.28);
    }
    .sbtn[data-state="0"]:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
    }

    .sbtn[data-state="1"] {
      background: rgba(251,191,36,0.1);
      border-color: rgba(251,191,36,0.3);
      color: #fbbf24;
    }
    .sbtn[data-state="1"]:hover { background: rgba(251,191,36,0.18); }

    .sbtn[data-state="2"] {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.3);
      color: #22c55e;
    }
    .sbtn[data-state="2"]:hover { background: rgba(34,197,94,0.18); }

    .sbtn-icon { font-size: 9px; line-height: 1; }

    /* ── TOOLTIP on hover (state hint) ─────────── */
    .sbtn[data-state="0"]::after { content: "→ Programado"; }
    .sbtn[data-state="1"]::after { content: "→ Postado"; }
    .sbtn[data-state="2"]::after { content: "→ Pendente"; }
    .sbtn::after {
      display: none;
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      border: 1px solid var(--border-2);
      color: var(--text-dim);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
    }
    .sbtn { position: relative; }
    .sbtn:hover::after { display: block; }

    /* ── EMPTY STATE ────────────────────────────── */
    .empty-col {
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      padding: 20px 0;
    }

    /* ══════════════════════════════════════════════
       TASK MANAGER
    ══════════════════════════════════════════════ */
    .tasks-section {
      padding: 0 16px 48px;
    }

    .tasks-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 16px;
      border-top: 1px solid var(--border);
    }

    .tasks-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .tasks-global-stats {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
    }

    .tasks-global-stat .n { color: var(--accent-text); font-weight: 500; }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      min-width: 1050px;
    }

    /* PANEL */
    .task-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-top: 3px solid var(--client-color, rgba(255,255,255,0.15));
    }
    .task-panel.is-internal {
      border-top-color: #7c5cfc;
      border-color: rgba(124,92,252,0.25);
      background: rgba(124,92,252,0.04);
    }
    .task-panel.is-internal .task-panel-name { color: var(--accent-text); }

    .task-panel-header {
      padding: 11px 13px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .task-panel-name {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .task-count {
      font-size: 9px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .task-count.has-pending {
      background: rgba(124,92,252,0.15);
      color: var(--accent-text);
    }

    /* INPUT */
    .task-input-row {
      display: flex;
      gap: 6px;
      padding: 8px 9px;
      border-bottom: 1px solid var(--border);
    }

    .task-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .task-input::placeholder { color: rgba(232,227,220,0.25); }

    .task-input:focus {
      border-color: rgba(124,92,252,0.4);
      background: #1a1a1a;
    }

    .task-add-btn {
      background: var(--accent-dim);
      border: 1px solid rgba(124,92,252,0.3);
      color: var(--accent-text);
      border-radius: 6px;
      width: 28px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-add-btn:hover { background: rgba(124,92,252,0.25); }

    /* LIST */
    .task-list {
      padding: 5px 7px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      max-height: 220px;
      overflow-y: auto;
      flex: 1;
    }

    .task-list::-webkit-scrollbar { width: 3px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 5px 5px;
      border-radius: 5px;
      transition: background 0.1s;
    }

    .task-item:hover { background: rgba(255,255,255,0.03); }

    .task-checkbox {
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      transition: all 0.15s;
      background: transparent;
      font-family: inherit;
      color: transparent;
    }

    .task-item.done .task-checkbox {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.45);
      color: #22c55e;
    }

    .task-text {
      flex: 1;
      font-size: 11px;
      line-height: 1.45;
      word-break: break-word;
      color: var(--text);
      transition: color 0.15s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .task-del {
      background: none;
      border: none;
      color: rgba(255,255,255,0.13);
      cursor: pointer;
      font-size: 15px;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      opacity: 0;
      transition: all 0.12s;
      font-family: inherit;
      margin-top: 0px;
    }

    .task-item:hover .task-del { opacity: 1; }
    .task-del:hover { color: #f87171; }

    .task-empty {
      font-size: 11px;
      color: rgba(232,227,220,0.2);
      text-align: center;
      padding: 18px 0 14px;
      font-style: italic;
    }

    /* FOOTER */
    .task-panel-footer {
      padding: 7px 9px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .task-done-count {
      font-size: 10px;
      color: rgba(34,197,94,0.5);
    }

    .task-clear-done {
      font-size: 10px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.18);
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: color 0.12s;
    }

    .task-clear-done:hover { color: rgba(248,113,113,0.65); }

    /* DUE DATE BADGE */
    .task-due {
      font-size: 9px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.01em;
      margin-top: 2px;
    }
    .task-due.due-overdue { background: rgba(248,113,113,0.18); color: #f87171; }
    .task-due.due-today   { background: rgba(251,191,36,0.22);  color: #fbbf24; }
    .task-due.due-soon    { background: rgba(251,191,36,0.12);  color: rgba(251,191,36,0.75); }
    .task-due.due-future  { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    /* DATE INPUT */
    .task-date-row {
      padding: 0 9px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-date-label {
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .task-date-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 7px;
      font-size: 10px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      color-scheme: dark;
    }
    .task-date-input:focus { border-color: rgba(124,92,252,0.4); }

    /* USER FILTERS + ASSIGNEE */
    .task-user-filters { display:flex; gap:4px; padding:6px 9px 0; }
    .task-filter-btn {
      font-size:9px; font-weight:600; padding:3px 9px; border-radius:20px;
      border:1px solid var(--border); background:transparent; color:var(--text-dim);
      cursor:pointer; font-family:inherit; transition:all .12s; letter-spacing:0.04em;
    }
    .task-filter-btn:hover { border-color:var(--border-2); color:var(--text); }
    .task-filter-btn.active { color:#fff; border-color:transparent; }
    .task-filter-btn.active[data-uid="all"]      { background:rgba(255,255,255,.13); color:var(--text); }
    .task-filter-btn.active[data-uid="priscila"] { background:#ec4899; }
    .task-filter-btn.active[data-uid="paul"]     { background:#7c5cfc; }

    .task-assignee-row { display:flex; gap:4px; padding:4px 9px 8px; border-bottom:1px solid var(--border); align-items:center; }
    .task-assignee-lbl { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; margin-right:2px; }
    .task-assignee-pill {
      font-size:9px; font-weight:600; padding:2px 9px; border-radius:20px;
      border:1px solid var(--border); background:transparent; color:var(--text-dim);
      cursor:pointer; font-family:inherit; transition:all .12s;
    }
    .task-assignee-pill:hover { border-color:var(--border-2); }
    .task-assignee-pill.sel[data-uid="priscila"] { background:#ec4899; border-color:#ec4899; color:#fff; }
    .task-assignee-pill.sel[data-uid="paul"]     { background:#7c5cfc; border-color:#7c5cfc; color:#fff; }
    .task-assignee-pill.sel[data-uid=""]         { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.2); color:var(--text); }
    .task-recurrence-row { display:flex; gap:4px; padding:4px 9px 8px; border-bottom:1px solid var(--border); align-items:center; }
    .task-recurrence-pill {
      font-size:9px; font-weight:600; padding:2px 9px; border-radius:20px;
      border:1px solid var(--border); background:transparent; color:var(--text-dim);
      cursor:pointer; font-family:inherit; transition:all .12s;
    }
    .task-recurrence-pill:hover { border-color:var(--border-2); }
    .task-recurrence-pill.sel[data-rec=""]        { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.2); color:var(--text); }
    .task-recurrence-pill.sel[data-rec="daily"]   { background:#34d399; border-color:#34d399; color:#052e16; }
    .task-recurrence-pill.sel[data-rec="weekly"]  { background:#34d399; border-color:#34d399; color:#052e16; }
    .task-recurrence-pill.sel[data-rec="monthly"] { background:#34d399; border-color:#34d399; color:#052e16; }

    .task-user-badge {
      font-size:8px; font-weight:700; padding:1px 6px; border-radius:20px;
      flex-shrink:0; line-height:1.6; letter-spacing:.03em;
    }
    .task-user-badge[data-uid="priscila"] { background:rgba(236,72,153,.18); color:#ec4899; }
    .task-user-badge[data-uid="paul"]     { background:rgba(124,92,252,.18); color:#a78bfa; }
    .task-recurrence-badge {
      font-size:8px; font-weight:700; padding:1px 6px; border-radius:20px;
      flex-shrink:0; line-height:1.6; letter-spacing:.03em;
      background:rgba(52,211,153,.15); color:#34d399;
    }

    /* ══════════════════════════════════════════════
       GERENCIADOR SEMANAL DE TAREFAS
    ══════════════════════════════════════════════ */
    .tw-section {
      padding: 0 16px 48px;
    }
    .tw-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 16px;
      border-top: 1px solid var(--border);
      gap: 16px;
    }
    .tw-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .tw-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tw-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      font-family: inherit;
    }
    .tw-nav-btn:hover { background: var(--surface-2); color: var(--text); }
    .tw-week-label {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 130px;
      text-align: center;
    }
    .tw-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(140px, 1fr));
      gap: 12px;
      min-width: 1050px;
    }
    .tw-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tw-col-hdr {
      padding: 9px 13px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tw-col-day {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }
    .tw-col-date {
      font-size: 10px;
      color: var(--text-dim);
    }
    .tw-col-hdr.tw-today { border-top: 3px solid var(--accent-text); padding-top: 6px; }
    .tw-col-hdr.tw-today .tw-col-day { color: var(--accent-text); }
    .tw-body {
      padding: 5px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 48px;
      max-height: 280px;
      overflow-y: auto;
      flex: 1;
    }
    .tw-body::-webkit-scrollbar { width: 3px; }
    .tw-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .tw-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 6px;
      border-left: 2px solid var(--client-color, rgba(255,255,255,0.15));
      background: rgba(255,255,255,0.025);
      transition: background 0.1s;
    }
    .tw-item:hover { background: rgba(255,255,255,0.05); }
    .tw-item.tw-done { opacity: 0.45; }
    .tw-cb {
      width: 13px;
      height: 13px;
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      background: transparent;
      font-family: inherit;
      color: transparent;
      transition: all 0.12s;
    }
    .tw-item.tw-done .tw-cb {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.45);
      color: #22c55e;
    }
    .tw-task-body { flex: 1; min-width: 0; }
    .tw-client-tag {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--client-color);
      opacity: 0.8;
      line-height: 1.3;
    }
    .tw-task-text {
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
      color: var(--text);
    }
    .tw-item.tw-done .tw-task-text { text-decoration: line-through; color: var(--text-dim); }
    .tw-empty {
      font-size: 10px;
      color: rgba(232,227,220,0.18);
      text-align: center;
      padding: 14px 0;
      font-style: italic;
    }
    /* tasks outside the displayed week */
    .tw-out-section { padding: 16px 0 0; }
    .tw-out-title {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 0 2px 6px;
    }
    .tw-out-list { display: flex; flex-direction: column; gap: 3px; }
    .tw-edit-btn {
      width:14px; height:14px; border:none; background:transparent; color:var(--text-dim);
      cursor:pointer; font-size:9px; flex-shrink:0; padding:0; line-height:1;
      opacity:0; transition:opacity .12s; margin-top:1px;
    }
    .tw-item:hover .tw-edit-btn { opacity:.7; }
    .tw-edit-btn:hover { opacity:1 !important; color:var(--text); }
    /* Task modal */
    .tw-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.72); backdrop-filter:blur(4px); z-index:600; display:none; align-items:center; justify-content:center; }
    .tw-modal-overlay.open { display:flex; }
    .tw-modal {
      background:#141414; border:1px solid var(--border-2); border-radius:14px;
      width:420px; max-width:92vw; box-shadow:0 20px 60px rgba(0,0,0,0.8);
      display:flex; flex-direction:column;
    }
    .tw-modal-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px 12px; border-bottom:1px solid var(--border);
    }
    .tw-modal-client { font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .tw-modal-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; line-height:1; padding:0 2px; }
    .tw-modal-close:hover { color:var(--text); }
    .tw-modal-body { padding:14px 18px; display:flex; flex-direction:column; gap:10px; }
    .tw-modal-body input[type=text], .tw-modal-body textarea {
      background:var(--surface-2); border:1px solid var(--border); border-radius:7px;
      color:var(--text); font-family:inherit; font-size:12px; padding:8px 10px; width:100%; box-sizing:border-box;
    }
    .tw-modal-body textarea { resize:vertical; min-height:60px; }
    .tw-modal-body input[type=text]:focus, .tw-modal-body textarea:focus { outline:none; border-color:var(--border-2); }
    .tw-modal-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
    .tw-modal-row { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
    .tw-modal-date { background:var(--surface-2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:inherit; font-size:12px; padding:6px 10px; }
    .tw-modal-foot { display:flex; gap:8px; justify-content:flex-end; padding:12px 18px; border-top:1px solid var(--border); }

    .tw-user-filters { display:flex; gap:4px; }
    .tw-filter-btn {
      font-size:9px; font-weight:600; padding:3px 10px; border-radius:20px;
      border:1px solid var(--border-2); background:var(--surface-2); color:var(--text-dim);
      cursor:pointer; font-family:inherit; transition:all .12s; letter-spacing:.04em;
    }
    .tw-filter-btn:hover { border-color:rgba(255,255,255,.25); color:var(--text); }
    .tw-filter-btn.active[data-uid="all"]      { background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.25); color:var(--text); }
    .tw-filter-btn.active[data-uid="priscila"] { background:#ec4899; border-color:#ec4899; color:#fff; }
    .tw-filter-btn.active[data-uid="paul"]     { background:#7c5cfc; border-color:#7c5cfc; color:#fff; }

    /* ══════════════════════════════════════════════
       CONTROLE DE CAPTAÇÕES
    ══════════════════════════════════════════════ */
    .cap-section {
      padding: 0 16px 48px;
    }

    .cap-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 16px;
      border-top: 1px solid var(--border);
    }

    .cap-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .cap-body {
      display: flex;
      gap: 16px;
      min-width: 1050px;
      align-items: flex-start;
    }

    .cap-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      min-width: 0;
    }

    /* CAPTURE CARD */
    .cap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-top: 3px solid var(--client-color, rgba(255,255,255,0.15));
    }

    .cap-card-header {
      padding: 11px 13px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .cap-card-name {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .cap-status {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }
    .cap-status.ok      { background: rgba(34,197,94,0.12);   color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .cap-status.warn    { background: rgba(251,191,36,0.12);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .cap-status.urgent  { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .cap-status.overdue { background: rgba(248,113,113,0.2);  color: #ef4444; border: 1px solid rgba(248,113,113,0.4); }
    .cap-status.empty   { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }

    .cap-card-body {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .cap-field { display: flex; flex-direction: column; gap: 4px; }

    .cap-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .cap-date-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      cursor: pointer;
      color-scheme: dark;
    }
    .cap-date-input:focus { border-color: rgba(124,92,252,0.4); background: #1a1a1a; }
    .cap-date-input::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    /* ── MINI CALENDAR ──────────────────────────── */
    .mini-cal {
      width: 258px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: 90px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 13px 10px;
      border-bottom: 1px solid var(--border);
    }

    .cal-month-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .cal-nav {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 22px;
      height: 22px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      padding: 0;
      line-height: 1;
    }
    .cal-nav:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }

    .cal-grid { padding: 8px 10px 6px; }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 3px;
    }
    .cal-wd {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--text-dim);
      padding: 2px 0;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .cal-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3px 1px 2px;
      border-radius: 5px;
      min-height: 28px;
      position: relative;
    }

    .cal-day-num {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
    }

    .cal-day.other-month .cal-day-num { color: rgba(255,255,255,0.12); }

    .cal-day.is-today {
      background: rgba(124,92,252,0.14);
      border: 1px solid rgba(124,92,252,0.3);
    }
    .cal-day.is-today .cal-day-num { color: var(--accent-text); font-weight: 700; }

    .cal-day.has-events { cursor: pointer; }
    .cal-day.has-events:hover { background: rgba(255,255,255,0.05); }
    .cal-day.is-today.has-events:hover { background: rgba(124,92,252,0.2); }

    .cal-dots {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 26px;
      margin-top: 2px;
    }

    .cal-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* TOOLTIP */
    .cal-tooltip {
      position: fixed;
      z-index: 9999;
      background: #1c1c1c;
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 170px;
      max-width: 230px;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: none;
    }
    .cal-tooltip.visible { display: block; }

    .cal-tooltip-date {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 9px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }

    .cal-tooltip-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .cal-tooltip-item:last-child { margin-bottom: 0; }

    .cal-tooltip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-tooltip-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .cal-tooltip-days {
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* LEGEND */
    .cal-legend {
      padding: 9px 13px 11px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .cal-legend-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .cal-legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .cal-legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       CRONOGRAMAS DE CONTEÚDO
    ══════════════════════════════════════════════ */
    .crono-section { padding: 0 16px 80px; }
    .crono-section-header { padding: 28px 0 16px; border-top: 1px solid var(--border); }
    .crono-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }

    .ficha-link-row { display:flex; gap:5px; align-items:center; }
    .ficha-link-row .ficha-input { flex:1; }
    .ficha-link-btn { background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--text-dim); border-radius:5px; width:24px; height:24px; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:all .12s; flex-shrink:0; font-family:inherit; }
    .ficha-link-btn:hover:not(:disabled) { background:var(--surface-2); color:var(--text); }
    .ficha-link-btn:disabled { opacity:.22; cursor:default; }
    .ficha-colors { display:flex; gap:6px; flex-wrap:wrap; }
    .ficha-swatch { width:24px; height:24px; border-radius:6px; border:1px solid rgba(255,255,255,.15); cursor:pointer; position:relative; overflow:hidden; flex-shrink:0; transition:transform .12s; }
    .ficha-swatch:hover { transform:scale(1.1); }
    .ficha-swatch input[type=color] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; padding:0; border:none; }

    /* ══════════════════════════════════════════════
       CONTROLE FINANCEIRO
    ══════════════════════════════════════════════ */
    .fin-section { padding: 0 16px 48px; }
    .fin-section-header { display:flex; align-items:center; padding:28px 0 16px; border-top:1px solid var(--border); }
    .fin-section-title { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
    .fin-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; min-width:1050px; }
    .fin-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; border-top:3px solid var(--client-color,rgba(255,255,255,.15)); }
    .fin-card-header { padding:11px 13px 9px; border-bottom:1px solid var(--border); }
    .fin-card-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
    .fin-body { padding:10px 11px; display:flex; flex-direction:column; gap:9px; flex:1; }
    .fin-row { display:flex; align-items:center; gap:6px; }
    .fin-lbl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); white-space:nowrap; min-width:46px; }
    .fin-currency { font-size:10px; color:var(--text-dim); white-space:nowrap; }
    .fin-input { background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px; font-family:inherit; color:var(--text); outline:none; transition:border-color .15s; min-width:0; flex:1; }
    .fin-input:focus { border-color:rgba(124,92,252,.4); }
    .fin-input::placeholder { color:rgba(232,227,220,.22); }
    .fin-input-sm { flex:0 0 44px !important; }
    .fin-hist { display:flex; gap:4px; flex-wrap:wrap; }
    .fin-pill { font-size:8px; font-weight:700; padding:3px 6px; border-radius:5px; cursor:pointer; border:1px solid transparent; transition:all .12s; text-align:center; line-height:1.4; font-family:inherit; min-width:30px; }
    .fin-pill span { font-size:7px; font-weight:400; display:block; }
    .fin-pill[data-st="0"] { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.1); color:rgba(255,255,255,.3); }
    .fin-pill[data-st="1"] { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.3); color:#22c55e; }
    .fin-pill[data-st="2"] { background:rgba(248,113,113,.12); border-color:rgba(248,113,113,.3); color:#f87171; }
    .fin-pill.fin-cur { outline:2px solid rgba(124,92,252,.55); outline-offset:1px; }

    /* ══════════════════════════════════════════════
       RESULTADOS MENSAIS
    ══════════════════════════════════════════════ */
    .result-section { padding: 0 16px 48px; }
    .result-section-header { display:flex; align-items:center; padding:28px 0 16px; border-top:1px solid var(--border); }
    .result-section-title { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
    .result-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; min-width:1050px; }
    .result-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; border-top:3px solid var(--client-color,rgba(255,255,255,.15)); }
    .result-card-header { padding:9px 11px 8px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .result-card-name { font-size:10px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .result-month-nav { display:flex; align-items:center; gap:3px; flex-shrink:0; }
    .result-nav-btn { background:var(--surface-2); border:1px solid var(--border); border-radius:4px; color:var(--text-dim); width:18px; height:18px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .12s; font-family:inherit; padding:0; line-height:1; }
    .result-nav-btn:hover { color:var(--text); background:rgba(255,255,255,.08); }
    .result-month-lbl { font-size:9px; color:var(--text-dim); min-width:52px; text-align:center; }
    .result-body { padding:8px 11px; display:flex; flex-direction:column; gap:6px; flex:1; }
    .result-field { display:flex; align-items:center; gap:8px; }
    .result-lbl { font-size:9px; color:var(--text-dim); white-space:nowrap; min-width:66px; font-weight:500; }
    .result-num { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:5px; padding:4px 7px; font-size:11px; font-family:inherit; color:var(--text); outline:none; transition:border-color .15s; min-width:0; }
    .result-num:focus { border-color:rgba(124,92,252,.4); }
    .result-num::placeholder,.result-obs::placeholder { color:rgba(232,227,220,.22); }
    .result-field-obs { align-items:flex-start; }
    .result-obs { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:5px; padding:4px 7px; font-size:10px; font-family:inherit; color:var(--text); outline:none; resize:none; min-height:34px; transition:border-color .15s; }
    .result-obs:focus { border-color:rgba(124,92,252,.4); }

    /* ── SECTION NAV ────────────────────────────── */
    .mm-snav {
      background: rgba(8,8,8,0.6);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      white-space: nowrap;
      padding: 0 16px;
    }
    .mm-snav::-webkit-scrollbar { display: none; }
    .mm-snav-inner {
      display: inline-flex;
      gap: 0;
      min-width: 100%;
    }
    .mm-snav-link {
      display: inline-block;
      padding: 9px 14px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
      cursor: pointer;
    }
    .mm-snav-link:hover { color: var(--text); }
    .mm-snav-link.active { color: var(--accent-text); border-bottom-color: var(--accent); }

    /* scroll-margin para compensar header + section nav */
    .sec-anchor { scroll-margin-top: 120px; }

    /* ══════════════════════════════════════════════
       MOBILE — max-width: 768px
    ══════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* ── HEADER ── */
      .mm-brand-row {
        padding: 10px 14px 9px;
        gap: 10px;
      }
      .mm-logo { height: 24px; }
      .mm-tagline { display: none; }
      .mm-date-badge { font-size: 9px; padding: 4px 9px; }
      .mm-nav-row {
        padding: 7px 12px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .week-nav { flex-wrap: wrap; gap: 6px; }
      .week-label { min-width: 130px; font-size: 12px; }
      .header-right { flex-wrap: wrap; gap: 8px; }
      .legend { display: none; }
      #btnClear { display: none; }

      /* ── DASHBOARD ── */
      .dash-section { padding: 12px 12px 14px; }
      .dash-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .dash-card-val { font-size: 22px; }

      /* ── STATS BAR ── */
      .stats-bar { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
      .progress-track { width: 100%; order: 3; flex: 1 1 100%; }
      .stats-badges { margin-left: 0; flex-wrap: wrap; }

      /* ── BOARD ── */
      .board-wrapper { padding: 8px; }
      .board { grid-template-columns: repeat(5, minmax(170px, 1fr)); }

      /* ── SEÇÕES — padding geral ── */
      .tasks-section,
      .tw-section,
      .notas-section,
      .cap-section,
      .ficha-section,
      .fin-section,
      .result-section,
      .crono-section { padding: 0 10px 32px; }

      /* ── SEÇÕES — headers ── */
      .tasks-section-header,
      .tw-section-header { flex-wrap: wrap; gap: 8px; padding: 20px 0 12px; }
      .tasks-global-stats { flex-wrap: wrap; gap: 6px; }

      /* ── GRIDS 5→2 colunas ── */
      .tasks-grid {
        grid-template-columns: repeat(2, 1fr);
        min-width: 0;
      }
      .tw-grid {
        grid-template-columns: repeat(7, minmax(140px, 1fr));
        min-width: 0;
      }
      #taskWeeklyWrap { overflow-x: auto; }
      .notas-grid {
        grid-template-columns: repeat(2, 1fr);
        min-width: 0;
      }
      .ficha-grid {
        grid-template-columns: repeat(2, 1fr);
        min-width: 0;
      }
      .fin-grid {
        grid-template-columns: repeat(2, 1fr);
        min-width: 0;
      }
      .result-grid {
        grid-template-columns: repeat(2, 1fr);
        min-width: 0;
      }

      /* ── CAPTAÇÕES ── */
      .cap-body {
        flex-direction: column;
        min-width: 0;
      }
      .cap-grid { grid-template-columns: repeat(2, 1fr); }
      .mini-cal { width: 100%; position: static; }

      /* ── CRONOGRAMAS — accordion body 3→1 coluna ── */
      .crono-acc-body {
        grid-template-columns: 1fr;
      }

      /* ── BOTÕES — área de toque maior ── */
      .btn { padding: 8px 13px; }

      /* ── TASK LIST — altura máxima maior ── */
      .task-list { max-height: none; }
      .tw-body { max-height: none; }
      .nota-list { max-height: none; }
      .client-tabs { overflow-x: auto; }
      .client-section-header { padding: 14px 12px 0; }
      .client-tab-panels { padding: 12px; }
    }

    /* ── SEÇÕES POR CLIENTE ──────────────────────────── */
    .client-section {
      border-top: 2px solid var(--border);
    }
    .client-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 0;
    }
    .client-section-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--client-color, var(--accent));
      flex-shrink: 0;
    }
    .client-section-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--client-color, var(--text));
      letter-spacing: -0.01em;
    }
    .client-tabs {
      display: flex;
      gap: 0;
      padding: 10px 20px 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .client-tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px 8px;
      cursor: pointer;
      white-space: nowrap;
      margin-bottom: -1px;
      letter-spacing: 0.04em;
      transition: color 0.15s;
      font-family: inherit;
    }
    .client-tab-btn:hover { color: var(--text); }
    .client-tab-btn.active {
      color: var(--client-color, var(--accent));
      border-bottom-color: var(--client-color, var(--accent));
    }
    .client-tab-panels {
      padding: 16px 20px 24px;
    }
    .client-tab-panel { display: none; }
    .client-tab-panel.active { display: block; }

    /* paineis dentro do cliente */
    .client-tab-panel .cap-card      { max-width: 400px; }
    .client-tab-panel .task-panel    { max-width: 520px; }
    .client-tab-panel .ficha-card    { max-width: 520px; }
    .client-tab-panel .nota-card     { max-width: 520px; }
    .client-tab-panel .result-card   { max-width: 520px; }
    .client-tab-panel .crono-accordion { max-width: 100%; }

    /* ── TAREFA: descrição ───────────────────────────── */
    .task-desc-row {
      padding: 0 10px 6px;
    }
    .task-desc-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 5px 9px;
      resize: none;
    }
    .task-desc-input:focus { outline: none; border-color: rgba(124,92,252,.4); }
    .task-desc-input::placeholder { color: rgba(232,227,220,.22); }
    .task-content { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .task-desc {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── TAREFA: editar ──────────────────────────────── */
    .task-edit-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,.18);
      font-size: 11px;
      padding: 0 3px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s;
      font-family: inherit;
    }
    .task-edit-btn:hover { color: var(--accent-text); }
    .task-item.editing {
      flex-direction: column;
      gap: 6px;
      padding: 10px;
    }
    .task-edit-input, .task-edit-desc {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 9px;
    }
    .task-edit-desc { resize: none; font-size: 11px; }
    .task-edit-input:focus, .task-edit-desc:focus { outline: none; border-color: rgba(124,92,252,.45); }
    .task-edit-row {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .task-edit-date {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 7px;
    }
    .task-edit-date:focus { outline: none; border-color: rgba(124,92,252,.4); }
    .task-save-btn {
      background: var(--accent-dim);
      border: 1px solid rgba(124,92,252,.35);
      border-radius: 6px;
      color: var(--accent-text);
      font-size: 11px;
      padding: 4px 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .task-save-btn:hover { background: rgba(124,92,252,.25); }
    .task-cancel-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .task-cancel-btn:hover { background: rgba(255,255,255,.04); }

    /* ── FINANCEIRO: mini-cal wrapper ────────────────── */
    .fin-cal-wrap {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .fin-cal-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding: 0 4px;
    }
    /* ── TASK FILES ────────────────────────────────── */
    .task-file-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 8px; flex-shrink: 0;
      line-height: 1.6; cursor: pointer; background: rgba(96,165,250,0.14);
      color: #60a5fa; border: none; font-family: inherit; transition: background .12s;
    }
    .task-file-badge:hover { background: rgba(96,165,250,0.26); }
    .task-attach-btn {
      font-size: 11px; cursor: pointer; color: rgba(255,255,255,0.22);
      transition: color .12s; flex-shrink: 0; line-height: 1;
    }
    .task-attach-btn:hover { color: #60a5fa; }
    .task-file-list {
      display: none; flex-direction: column; gap: 3px;
      padding: 5px 0 1px; border-top: 1px solid var(--border); width: 100%;
    }
    .task-file-list.open { display: flex; }
    .task-file-item { display: flex; align-items: center; gap: 5px; }
    .task-file-dl {
      font-size: 10px; color: #60a5fa; background: none; border: none;
      cursor: pointer; padding: 0; font-family: inherit; flex: 1;
      text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-file-dl:hover { text-decoration: underline; }
    .task-file-rm {
      background: none; border: none; color: rgba(248,113,113,.4);
      cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px;
      font-family: inherit; flex-shrink: 0;
    }
    .task-file-rm:hover { color: #f87171; }
    .task-file-add-label {
      font-size: 10px; color: rgba(96,165,250,.7); cursor: pointer;
      border: 1px dashed rgba(96,165,250,.3); border-radius: 5px;
      padding: 3px 9px; display: inline-block; transition: all .12s; margin-top: 4px;
    }
    .task-file-add-label:hover { border-color: rgba(96,165,250,.6); color: #60a5fa; }

    /* ── ACESSOS ────────────────────────────────────── */
    .acessos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 10px; padding: 14px 0 4px;
    }
    .acesso-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 9px; padding: 12px 13px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .acesso-card-header {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; color: var(--text);
    }
    .acesso-icon { font-size: 16px; line-height: 1; }
    .acesso-field-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-dim); margin-bottom: 2px;
    }
    .acesso-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: inherit;
      font-size: 11px; padding: 5px 8px; transition: border-color .15s;
    }
    .acesso-input:focus { outline: none; border-color: rgba(124,92,252,.45); }
    .acesso-pass-wrap { display: flex; gap: 4px; align-items: center; }
    .acesso-pass-wrap .acesso-input { flex: 1; }
    .acesso-eye {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-dim); cursor: pointer; font-size: 12px;
      padding: 4px 7px; line-height: 1; font-family: inherit; flex-shrink: 0;
      transition: all .12s;
    }
    .acesso-eye:hover { border-color: var(--border-2); color: var(--text); }
    .acesso-saved { font-size: 9px; color: rgba(52,211,153,.7); text-align: right; min-height: 12px; }

  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="mm-brand-row">
    <div class="mm-logo-wrap">
      <img class="mm-logo"
           src="../../comercial/proposta-geral/logo-horizontal-bege%20.png"
           onerror="this.src='../../comercial/proposta-geral/logo-horizontal-verde.png'"
           alt="Moving Marketing">
    </div>
    <div class="mm-brand-center">
      <span class="mm-tagline">Conteúdo que move marcas.</span>
    </div>
    <div class="mm-brand-right">
      <span class="mm-date-badge" id="mmDateBadge">—</span>
    </div>
  </div>
  <div class="mm-nav-row">
    <div class="week-nav">
      <button class="btn" id="btnPrev" title="Semana anterior">‹</button>
      <span class="week-label" id="weekLabel">—</span>
      <button class="btn" id="btnNext" title="Próxima semana">›</button>
      <button class="btn btn-accent" id="btnToday">Hoje</button>
    </div>
    <div class="header-right">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot s0"></div><span>Pendente</span></div>
        <div class="legend-item"><div class="legend-dot s1"></div><span>Programado</span></div>
        <div class="legend-item"><div class="legend-dot s2"></div><span>Postado</span></div>
      </div>
      <button class="btn btn-danger" id="btnClear">Limpar semana</button>
    </div>
  </div>
  <nav class="mm-snav" id="mmSnav">
    <div class="mm-snav-inner" id="mmSnavInner">
      <a class="mm-snav-link" href="#sec-dashboard">Dashboard</a>
      <a class="mm-snav-link" href="#taskWeeklyWrap">Tarefas</a>
      <a class="mm-snav-link" href="#sec-kanban">Kanban</a>
      <a class="mm-snav-link" href="#sec-financeiro">Financeiro</a>
    </div>
  </nav>
</header>

<!-- DASHBOARD -->
<div class="dash-section sec-anchor" id="sec-dashboard">
  <div class="dash-grid" id="dashGrid"></div>
</div>

<!-- GERENCIADOR SEMANAL DE TAREFAS -->
<div class="tw-section sec-anchor" id="taskWeeklyWrap">
  <div class="tw-section-header">
    <span class="tw-section-title">Gerenciador Semanal de Tarefas</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="tw-user-filters" id="twUserFilters">
        <button class="tw-filter-btn active" data-uid="all">Todas</button>
        <button class="tw-filter-btn" data-uid="priscila">Priscila</button>
        <button class="tw-filter-btn" data-uid="paul">Paul</button>

let _lastLocalWrite = 0;
const _SKIP_SYNC    = ['mmmat__', 'mmtaskf__', 'mmacesso__', 'mmideaf__', 'mmeditf__']; // base64 e senhas — só localStorage

function mmGet(key)       { return localStorage.getItem(key); }
function mmSet(key, val)  {
  localStorage.setItem(key, val);
  if (!_SKIP_SYNC.some(p => key.startsWith(p))) { _lastLocalWrite = Date.now(); _scheduleSync(); }
}
function mmRemove(key) {
  localStorage.removeItem(key);
  if (!_SKIP_SYNC.some(p => key.startsWith(p))) { _lastLocalWrite = Date.now(); _scheduleSync(); }
}

function _scheduleSync() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(_pushToCloud, 1500);
}

async function _pushToCloud() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && !_SKIP_SYNC.some(p => k.startsWith(p))) data[k] = localStorage.getItem(k);
  }
  try { await _fsdb.collection('kanban').doc('state').set({ data, ts: Date.now() }); }
  catch(e) { console.warn('[Firebase] push error', e); }
}

async function _loadFromCloud() {
  try {
    const doc = await _fsdb.collection('kanban').doc('state').get();
    if (doc.exists) {
      const { data } = doc.data();
      Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
    }
  } catch(e) { console.warn('[Firebase] load error', e); }
}

function _subscribeToChanges() {
  let _firstSnap = true;
  _fsdb.collection('kanban').doc('state').onSnapshot(snap => {
    if (!snap.exists) return;
    if (_firstSnap) { _firstSnap = false; return; }
    const { data, ts } = snap.data();
    if (Date.now() - _lastLocalWrite < 4000) return;
    Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
    _showSyncBanner();
    setTimeout(() => location.reload(), 1500);
  });
}

// ─── WEEK OFFSET ────────────────────────────────────────────────────────────

let weekOffset = 0;

function getMondayOfWeek(offset) {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(today);
  mon.setDate(today.getDate() + diff + offset * 7);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function getWeekDates(offset) {
  const mon = getMondayOfWeek(offset);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function isToday(date) {
  const t = new Date();
  return date.toDateString() === t.toDateString();
}

function fmtDate(d) {
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function fmtFull(d) {
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

// ─── STORAGE ────────────────────────────────────────────────────────────────

function wkKey(dates) {
  const d = dates[0];
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function stKey(wk, clientId, dayIdx, platId, type) {
  return `mmk_${wk}__${clientId}__${dayIdx}__${platId}__${type}`;
}

function getState(wk, clientId, dayIdx, platId, type) {
  return parseInt(mmGet(stKey(wk, clientId, dayIdx, platId, type)) || '0');
}

function saveState(wk, clientId, dayIdx, platId, type, val) {
  if (val === 0) mmRemove(stKey(wk, clientId, dayIdx, platId, type));
  else mmSet(stKey(wk, clientId, dayIdx, platId, type), String(val));
}

function clearWeek(wk) {
  const prefix = `mmk_${wk}__`;
  Object.keys(localStorage)
    .filter(k => k.startsWith(prefix))
    .forEach(k => mmRemove(k));
}

// ─── STATS ───────────────────────────────────────────────────────────────────

function computeStats(wk) {
  let total = 0, prog = 0, posted = 0;
  CLIENTS.filter(c => !c.noKanban).forEach(c => {
    c.platforms.forEach(p => {
      const types = ['feed', ...(p.stories ? ['stories'] : [])];
      for (let d = 0; d < 5; d++) {
        types.forEach(t => {
          total++;
          const s = getState(wk, c.id, d, p.id, t);
          if (s === 1) prog++;
          if (s === 2) posted++;
        });
      }
    });
  });
  return { total, prog, posted, done: prog + posted };
}

        const group = document.createElement('div');

        // Feed button

        types.forEach(type => {
          const label = type === 'feed' ? plat.feed : plat.stories;
          const state = getState(currentWk, client.id, di, plat.id, type);
          const btn = document.createElement('button');
          btn.className = 'sbtn';
          btn.dataset.state = state;
          btn.dataset.client = client.id;
          btn.dataset.day = di;
          btn.dataset.plat = plat.id;
          btn.dataset.type = type;
          btn.title = `${client.name} — ${plat.label} ${label} — ${STATE_TITLES[state]}`;
          btn.innerHTML = `<span class="sbtn-icon">${STATE_ICONS[state]}</span>${label}`;
          btn.addEventListener('click', onToggle);
          group.appendChild(btn);
        });

        row.appendChild(group);
        card.appendChild(row);
      });

      body.appendChild(card);
    });

    col.appendChild(body);
    board.appendChild(col);
  });

  updateStats();
}

function onToggle(e) {
  const btn = e.currentTarget;
  const { client, day, plat, type } = btn.dataset;
  const cur = parseInt(btn.dataset.state);
  const next = (cur + 1) % 3;
  saveState(currentWk, client, parseInt(day), plat, type, next);
  btn.dataset.state = next;
  btn.title = btn.title.replace(STATE_TITLES[cur], STATE_TITLES[next]);
  btn.innerHTML = `<span class="sbtn-icon">${STATE_ICONS[next]}</span>${btn.textContent.trim().replace(/^[○◐✓]\s*/, '')}`;
  updateStats();
  // Sync: kanban IG feed → cronograma
  if (plat === 'ig' && type === 'feed') {
    const iso = kanbanDayToISO(currentWk, parseInt(day));
    if (typeof syncKanbanToSched === 'function') syncKanbanToSched(client, iso);
  }
}

function updateStats() {
  const { total, prog, posted, done } = computeStats(currentWk);
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statsText').innerHTML = `<span class="n">${done}</span> / ${total} feitos`;
  document.getElementById('badgeProg').textContent = `${prog} programado${prog !== 1 ? 's' : ''}`;
  document.getElementById('badgePost').textContent = `${posted} postado${posted !== 1 ? 's' : ''}`;
}

function taskKey(clientId) {
  return `mmtasks__${clientId}`;
}

// ── Arquivos de tarefas ──────────────────────────────────────────────────────
function loadTaskFiles(taskId) {
  try { return JSON.parse(localStorage.getItem(`mmtaskf__${taskId}`) || '[]'); }
  catch { return []; }
}
function saveTaskFiles(taskId, files) {
  localStorage.setItem(`mmtaskf__${taskId}`, JSON.stringify(files));
}
function deleteTaskFiles(taskId) {
  localStorage.removeItem(`mmtaskf__${taskId}`);
}
function downloadFile(f) {
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  a.click();
}
function fileToBase64(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

function loadTasks(clientId) {
  try { return JSON.parse(mmGet(taskKey(clientId)) || '[]'); }
  catch { return []; }
}

function saveTasks(clientId, tasks) {
  mmSet(taskKey(clientId), JSON.stringify(tasks));
}

function nextRecurrenceDate(iso, recurrence) {
  const base = iso ? new Date(iso + 'T00:00:00') : new Date();
  if (recurrence === 'daily')   base.setDate(base.getDate() + 1);
  if (recurrence === 'weekly')  base.setDate(base.getDate() + 7);
  if (recurrence === 'monthly') base.setMonth(base.getMonth() + 1);
  return base.toISOString().slice(0, 10);
}

function addTask(clientId, text, desc, dueDate, assignee, recurrence) {
  if (!text.trim()) return;
  const tasks = loadTasks(clientId);
  tasks.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text: text.trim(),
    desc: desc ? desc.trim() : '',
    done: false,
    dueDate:    dueDate    || '',
    assignee:   assignee   || '',
    recurrence: recurrence || ''
  });
  saveTasks(clientId, tasks);
  refreshTaskPanel(clientId);
  updateGlobalTaskStats();
  refreshWeeklyManager();
  refreshDashboard();
}

function toggleTask(clientId, id) {
  const tasks = loadTasks(clientId);
  const t = tasks.find(t => t.id === id);
  if (t) {
    const completing = !t.done;
    t.done = completing;
    if (completing && t.recurrence) {
      tasks.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        text: t.text,
        desc: t.desc || '',
        done: false,
        dueDate:    nextRecurrenceDate(t.dueDate, t.recurrence),
        assignee:   t.assignee   || '',
        recurrence: t.recurrence
      });
    }
    saveTasks(clientId, tasks);
  }
  refreshTaskPanel(clientId);
  updateGlobalTaskStats();
  refreshWeeklyManager();
  refreshDashboard();
}

function deleteTask(clientId, id) {
  saveTasks(clientId, loadTasks(clientId).filter(t => t.id !== id));
  deleteTaskFiles(id);
  refreshTaskPanel(clientId);
  updateGlobalTaskStats();
  refreshWeeklyManager();
  refreshDashboard();
}

function clearDoneTasks(clientId) {
  saveTasks(clientId, loadTasks(clientId).filter(t => !t.done));
  refreshTaskPanel(clientId);
  updateGlobalTaskStats();
  refreshWeeklyManager();
  refreshDashboard();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function refreshTaskPanel(clientId) {
  const panel = document.getElementById(`tpanel-${clientId}`);
  if (!panel) return;

  const allTasks = loadTasks(clientId);
  const filter   = taskFilters[clientId] || 'all';

  const visible = filter === 'all' ? allTasks : allTasks.filter(t => t.assignee === filter);
  const pending  = allTasks.filter(t => !t.done).length;
  const doneCnt  = allTasks.length - pending;

  // Count badge
  const countEl = panel.querySelector('.task-count');
  if (allTasks.length === 0) {
    countEl.textContent = 'sem tarefas';
    countEl.className = 'task-count';
  } else {
    countEl.textContent = `${pending} pendente${pending !== 1 ? 's' : ''} · ${allTasks.length} total`;
    countEl.className = 'task-count' + (pending > 0 ? ' has-pending' : '');
  }

  // Sync filter buttons
  panel.querySelectorAll('.task-filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.uid === filter);
  });

  // Task list
  const listEl = panel.querySelector('.task-list');
  if (visible.length === 0) {
    listEl.innerHTML = `<div class="task-empty">${filter !== 'all' ? 'Nenhuma tarefa para este usuário' : 'Nenhuma tarefa'}</div>`;
  } else {
    const sorted = [...visible.filter(t => !t.done), ...visible.filter(t => t.done)];
    listEl.innerHTML = sorted.map(task => {
      const dueBadge  = task.dueDate  ? `<span class="task-due ${dueCls(task.dueDate)}">${dueFmt(task.dueDate)}</span>` : '';
      const userBadge = task.assignee ? `<span class="task-user-badge" data-uid="${task.assignee}">${USERS.find(u=>u.id===task.assignee)?.name||''}</span>` : '';
      const descHtml  = task.desc     ? `<div class="task-desc">${escHtml(task.desc)}</div>` : '';
      const recurrenceLabels = { daily: 'diária', weekly: 'semanal', monthly: 'mensal' };
      const recBadge  = task.recurrence ? `<span class="task-recurrence-badge">↻ ${recurrenceLabels[task.recurrence]||task.recurrence}</span>` : '';
      const taskFiles = loadTaskFiles(task.id);
      const fileBadge = taskFiles.length > 0
        ? `<button class="task-file-badge" data-action="togglefiles" data-taskid="${task.id}" title="Ver arquivos">📎 ${taskFiles.length}</button>`
        : '';
      const fileListHtml = taskFiles.length > 0
        ? `<div class="task-file-list" id="tfiles-${task.id}">${taskFiles.map(f =>
            `<div class="task-file-item">
              <button class="task-file-dl" data-action="dlfile" data-taskid="${task.id}" data-fileid="${f.id}" title="${escHtml(f.name)}">${escHtml(f.name)}</button>
              <button class="task-file-rm" data-action="rmfile" data-client="${clientId}" data-taskid="${task.id}" data-fileid="${f.id}" title="Remover">×</button>
            </div>`).join('')}</div>`
        : '';
      return `
      <div class="task-item${task.done ? ' done' : ''}" data-id="${task.id}">
        <button class="task-checkbox" data-action="toggle" data-client="${clientId}" data-id="${task.id}" title="${task.done ? 'Reabrir' : 'Concluir'}">${task.done ? '✓' : ''}</button>
        <div class="task-content">
          <span class="task-text">${escHtml(task.text)}</span>
          ${descHtml}
          ${fileListHtml}
        </div>
        ${recBadge}${dueBadge}${userBadge}${fileBadge}
        <label class="task-attach-btn" title="Anexar arquivo">📎<input type="file" class="task-file-picker" data-taskid="${task.id}" data-client="${clientId}" multiple style="display:none"></label>
        <button class="task-edit-btn" data-action="edit" data-client="${clientId}" data-id="${task.id}" title="Editar">✏</button>
        <button class="task-del" data-action="delete" data-client="${clientId}" data-id="${task.id}" title="Remover">×</button>
      </div>`;
    }).join('');

    listEl.querySelectorAll('[data-action="toggle"]').forEach(b =>
      b.addEventListener('click', () => toggleTask(b.dataset.client, b.dataset.id))
    );
    listEl.querySelectorAll('[data-action="edit"]').forEach(b =>
      b.addEventListener('click', () => editTask(b.dataset.client, b.dataset.id))
    );
    listEl.querySelectorAll('[data-action="delete"]').forEach(b =>
      b.addEventListener('click', () => deleteTask(b.dataset.client, b.dataset.id))
    );
    listEl.querySelectorAll('[data-action="togglefiles"]').forEach(b =>
      b.addEventListener('click', () => {
        const list = document.getElementById(`tfiles-${b.dataset.taskid}`);
        if (list) list.classList.toggle('open');
      })
    );
    listEl.querySelectorAll('[data-action="dlfile"]').forEach(b =>
      b.addEventListener('click', () => {
        const f = loadTaskFiles(b.dataset.taskid).find(f => f.id === b.dataset.fileid);
        if (f) downloadFile(f);
      })
    );
    listEl.querySelectorAll('[data-action="rmfile"]').forEach(b =>
      b.addEventListener('click', () => {
        saveTaskFiles(b.dataset.taskid, loadTaskFiles(b.dataset.taskid).filter(f => f.id !== b.dataset.fileid));
        refreshTaskPanel(b.dataset.client);
      })
    );
    listEl.querySelectorAll('.task-file-picker').forEach(inp =>
      inp.addEventListener('change', async function() {
        const files = loadTaskFiles(this.dataset.taskid);
        for (const file of this.files) {
          files.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2),
            name: file.name, type: file.type,
            data: await fileToBase64(file)
          });
        }
        saveTaskFiles(this.dataset.taskid, files);
        refreshTaskPanel(this.dataset.client);
        this.value = '';
      })
    );
  }

  // Footer
  const footer = panel.querySelector('.task-panel-footer');
  if (doneCnt > 0) {
    footer.style.display = 'flex';
    panel.querySelector('.task-done-count').textContent = `${doneCnt} concluída${doneCnt !== 1 ? 's' : ''}`;
  } else {
    footer.style.display = 'none';
  }
}

function updateGlobalTaskStats() {
  let totalPending = 0, totalDone = 0;
  [...CLIENTS, MOVING_CLIENT].forEach(c => {
    const tasks = loadTasks(c.id);
    tasks.forEach(t => t.done ? totalDone++ : totalPending++);
  });
  const el = document.getElementById('globalTaskStats');
  if (totalPending + totalDone === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <span class="tasks-global-stat"><span class="n">${totalPending}</span> pendente${totalPending !== 1 ? 's' : ''}</span>
    <span style="color:var(--border-2)">·</span>
    <span class="tasks-global-stat"><span class="n">${totalDone}</span> concluída${totalDone !== 1 ? 's' : ''}</span>
  `;
}

        <span class="task-assignee-lbl">Para</span>

        <button class="task-clear-done" data-client="${client.id}">Limpar concluídas</button>
